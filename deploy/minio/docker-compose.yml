# de-minio — object storage no HDD barato do DE1. Só na tailnet (NUNCA público: tem creds).
# Deploy: preencher .env (creds + TAILNET_IP), montar o HDD em /srv/minio, `docker compose up -d`.
services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Consola atrás do NPMPlus/Authentik em https://netprospect.minio.netmaster.pt.
      # Sem isto, o MinIO redireciona para o host:porta interno e o login parte. Vazio = desligado.
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-}
      # Métricas Prometheus sem bearer (só tailnet, sem creds sensíveis) → job 'minio' do CT200.
      MINIO_PROMETHEUS_AUTH_TYPE: 'public'
    volumes:
      - /srv/minio:/data            # o HDD
    ports:
      - "${TAILNET_IP}:9000:9000"    # API — tailnet (S3 + reverse-proxy)
      # Consola: no tailnet para o NPMPlus (noutro host) lhe chegar. Estava só em 127.0.0.1,
      # e era ESSE o motivo de não abrir em netprospect.minio.netmaster.pt (não a firewall do DE1).
      - "${TAILNET_IP}:9001:9001"    # consola — tailnet (para o reverse-proxy)
      - "127.0.0.1:9001:9001"        # consola — local (túnel SSH)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
