# O NPMplus faz `location /docs/ { proxy_pass http://<host>:8088/; }` (trailing slash → tira /docs/),
# por isso este nginx serve o dist na RAIZ. O HTML tem base=/docs/ → os assets pedem /docs/assets/*,
# que o NPMplus mapeia de volta para /assets/* aqui.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
  location / {
    try_files $uri /index.html;   # HashRouter: tudo cai no index (fallback inofensivo)
  }
}
