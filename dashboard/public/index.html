<!doctype html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NetProspect</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iI0VBMEIyQSIvPjxyZWN0IHg9IjEwLjUiIHk9IjEwLjUiIHdpZHRoPSIxMSIgaGVpZ2h0PSIxMSIgcng9IjIiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSIyLjYiIHRyYW5zZm9ybT0icm90YXRlKDQ1IDE2IDE2KSIvPjwvc3ZnPg==" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="netprospect.css" />
<script>
  // Tema antes do paint (evita flash). Default: dark.
  (function () { try { document.documentElement.setAttribute('data-theme', localStorage.getItem('np-theme') || 'dark'); } catch (e) {} })();
</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  html, body { max-width: 100%; overflow-x: hidden; }
  body { background: var(--np-bg); color: var(--np-text); font-family: var(--np-font); font-size: var(--np-fs-body); line-height: var(--np-lh-body); }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; } ::-webkit-scrollbar-thumb { background: var(--np-border-2); border-radius: 999px; } ::-webkit-scrollbar-track { background: transparent; }
  .tnum { font-variant-numeric: tabular-nums; }
  .muted { color: var(--np-text-3); } .faint { color: var(--np-text-faint); }
  svg { display: block; }

  /* Top bar */
  .np-topbar { position: sticky; top: 0; z-index: var(--np-z-nav); height: var(--np-topbar-h); background: var(--np-chrome); border-bottom: 1px solid var(--np-chrome-border); display: flex; align-items: center; gap: var(--np-s5); padding: 0 var(--np-s5); color: var(--np-chrome-text); display: flex; justify-content: space-between; }
  .np-brand { display: flex; align-items: center; gap: 10px; }
  .np-brandmark { width: 28px; height: 28px; border-radius: 8px; background: var(--np-brand-fill); box-shadow: var(--np-shadow-brand); display: grid; place-items: center; }
  .np-brandmark i { width: 12px; height: 12px; border: 2.5px solid #fff; transform: rotate(45deg); border-radius: 2px; }
  .np-word { font-weight: 800; font-size: 16px; letter-spacing: -0.01em; }
  .np-pilltag { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--np-chrome-text-2); border: 1px solid var(--np-chrome-border); padding: 2px 6px; border-radius: 999px; }
  .np-tsearch { flex: 1; max-width: 520px; height: 34px; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--np-chrome-border); border-radius: var(--np-radius); color: var(--np-chrome-text-2); font-size: 13px; }
  .np-tsearch input { flex: 1; background: none; border: none; color: var(--np-chrome-text); font: inherit; outline: none; }
  .np-kbd { font-size: 10px; border: 1px solid var(--np-chrome-border); border-radius: 4px; padding: 1px 5px; }
  .np-mic { width: 26px; height: 26px; display: grid; place-items: center; border: none; background: transparent; color: var(--np-chrome-text-2); border-radius: 6px; cursor: pointer; }
  .np-mic:hover { background: rgba(255,255,255,0.10); color: var(--np-chrome-text); }
  .np-mic.rec { color: #fff; background: var(--np-brand-fill); animation: micpulse 1s infinite; }
  @keyframes micpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  /* Sidebar colapsada (só ícones) */
  .np-shell.nav-collapsed .np-nav { flex-basis: var(--np-nav-w-collapsed); width: var(--np-nav-w-collapsed); padding-left: 8px; padding-right: 8px; }
  .np-shell.nav-collapsed .np-nav-row { justify-content: center; padding: 0; }
  .np-shell.nav-collapsed .np-nav-row span, .np-shell.nav-collapsed .np-nav-eyebrow { display: none; }
  .np-shell.nav-collapsed .np-nav-head { display: none; }
  .np-shell.nav-collapsed .np-nav-group.collapsed .np-nav-sub { display: block; }
  .np-iconbtn { width: 34px; height: 34px; display: grid; place-items: center; border-radius: var(--np-radius); border: 1px solid var(--np-chrome-border); background: transparent; color: var(--np-chrome-text-2); cursor: pointer; position: relative; margin-right: 10px; }
  .np-iconbtn:hover { background: var(--np-chrome-2); color: var(--np-chrome-text); }
  .np-themebtn { width: auto; padding: 0 12px; gap: 6px; display: flex; align-items: center; font: inherit; font-size: 12px; font-weight: 600; }
  .np-avatar { width: 30px; height: 30px; border-radius: 999px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 12px; background: linear-gradient(135deg, #EA0B2A, #F2B234); }

  /* Shell */
  .np-shell { display: flex; align-items: flex-start; }
  .np-nav { position: sticky; top: var(--np-topbar-h); flex: 0 0 var(--np-nav-w); width: var(--np-nav-w); height: calc(100vh - var(--np-topbar-h)); background: var(--np-chrome); border-right: 1px solid var(--np-chrome-border); overflow-y: auto; padding: var(--np-s4) var(--np-s3); color: var(--np-chrome-text-2); }
  .np-nav-eyebrow { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--np-chrome-text-2); padding: 0 10px; margin: var(--np-s4) 0 var(--np-s2); }
  .np-nav-row { display: flex; align-items: center; gap: 9px; height: 30px; padding: 0 10px; border-radius: var(--np-radius); font-size: 12.5px; font-weight: 500; color: var(--np-chrome-text-2); cursor: pointer; margin-bottom: 1px; }
  .np-nav-row:hover { background: var(--np-chrome-2); color: var(--np-chrome-text); }
  .np-nav-row.is-active { color: var(--np-chrome-text); background: var(--np-chrome-2); box-shadow: inset 3px 0 0 var(--np-brand); font-weight: 700; }
  .np-nav-row.is-active svg { color: var(--np-brand); }
  .np-nav-count { margin-left: auto; font-size: 11px; font-variant-numeric: tabular-nums; color: var(--np-chrome-text-2); }
  /* Submenus colapsáveis */
  .np-nav-head { display: flex; align-items: center; gap: 6px; height: 26px; padding: 0 10px; margin-top: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--np-chrome-text-2); cursor: pointer; user-select: none; border-radius: var(--np-radius); }
  .np-nav-head:hover { color: var(--np-chrome-text); background: var(--np-chrome-2); }
  .np-nav-chev { margin-left: auto; display: inline-flex; opacity: .55; transition: transform .15s ease; }
  .np-nav-group.collapsed .np-nav-chev { transform: rotate(-90deg); }
  .np-nav-group.collapsed .np-nav-sub { display: none; }
  .np-nav-dot { width: 8px; height: 8px; border-radius: 999px; }
  .np-fresh { margin-top: var(--np-s4); background: rgba(255,255,255,0.04); border: 1px solid var(--np-chrome-border); border-radius: var(--np-radius); padding: 10px 12px; font-size: 11px; }
  .np-fresh .d { width: 7px; height: 7px; border-radius: 999px; background: var(--np-ok-mark); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); display: inline-block; margin-right: 6px; }

  .np-main { flex: 1 1 auto; min-width: 0; min-height: calc(100vh - var(--np-topbar-h)); padding: var(--np-s6) 26px; }
  .np-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--np-brand-ink); font-weight: 700; }
  .np-h1 { font-size: var(--np-fs-display); font-weight: 800; letter-spacing: -0.02em; margin: 4px 0 2px; }
  .np-sub { color: var(--np-text-3); font-size: 13px; }
  .np-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }

  /* Cards */
  .np-card { background: var(--np-surface); border: 1px solid var(--np-border); border-radius: var(--np-radius-lg); box-shadow: var(--np-shadow-card); }
  .np-card-h { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--np-divider); }
  .np-card-h h2 { font-size: var(--np-fs-h1); font-weight: 800; margin: 0; }
  .np-card-b { padding: 16px 18px; }
  .np-grid { display: grid; gap: 16px; }

  /* KPI */
  .np-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(184px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .np-kpi { background: var(--np-surface); border: 1px solid var(--np-border); border-radius: var(--np-radius-lg); padding: 15px 16px; box-shadow: var(--np-shadow-card); transition: transform var(--np-dur) var(--np-ease), border-color var(--np-dur); }
  a.np-kpi:hover { transform: translateY(-2px); border-color: var(--np-brand-soft-bd); }
  .np-kpi-l { display: flex; align-items: center; gap: 8px; color: var(--np-text-3); font-size: 12px; }
  .np-kpi-ic { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center; background: var(--np-brand-soft); color: var(--np-brand); }
  .np-kpi-v { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-top: 8px; }

  /* Buttons */
  .np-btn { display: inline-flex; align-items: center; gap: 7px; height: 36px; padding: 0 14px; border-radius: var(--np-radius-sm); font: inherit; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--np-border); background: var(--np-surface-2); color: var(--np-text); }
  .np-btn:hover { border-color: var(--np-border-2); }
  .np-btn--primary { background: var(--np-brand-fill); color: var(--np-on-brand); border-color: transparent; box-shadow: var(--np-shadow-brand); }
  .np-btn--primary:hover { background: var(--np-brand-hover); }
  .np-btn--sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .np-seg { display: inline-flex; background: var(--np-surface-2); border: 1px solid var(--np-border); border-radius: var(--np-radius); padding: 2px; gap: 2px; }
  .np-seg button { height: 26px; padding: 0 12px; border: none; background: none; color: var(--np-text-3); font: inherit; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; }
  .np-seg button.on { background: var(--np-surface); color: var(--np-text); box-shadow: var(--np-shadow-card); }

  /* Badges + chips */
  .np-badge { display: inline-flex; align-items: center; gap: 5px; height: 22px; padding: 0 8px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .np-badge.ok { color: var(--np-ok); background: var(--np-ok-soft); border: 1px solid var(--np-ok-soft-bd); }
  .np-badge.warn { color: var(--np-warn); background: var(--np-warn-soft); border: 1px solid var(--np-warn-soft-bd); }
  .np-badge.info { color: var(--np-info); background: var(--np-info-soft); border: 1px solid var(--np-info-soft-bd); }
  .np-badge.neutral { color: var(--np-neutral); background: var(--np-neutral-soft); border: 1px solid var(--np-neutral-soft-bd); }
  .np-badge.brand { color: var(--np-brand-ink); background: var(--np-brand-soft); border: 1px solid var(--np-brand-soft-bd); }
  .np-chip { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: 999px; font-size: 11px; font-weight: 600; color: var(--np-text-2); background: var(--np-surface-2); border: 1px solid var(--np-border); }
  .np-dot { width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto; }

  /* Tables */
  .np-tablewrap { overflow: auto; }
  table.np-table { width: 100%; border-collapse: collapse; }
  .np-table th { position: sticky; top: 0; z-index: 2; background: var(--np-surface-2); height: 42px; text-align: left; padding: 0 var(--np-cell-x); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--np-text-3); font-weight: 700; border-bottom: 1px solid var(--np-border); white-space: nowrap; }
  .np-table td { height: var(--np-row-h); padding: 0 var(--np-cell-x); border-bottom: 1px solid var(--np-divider); font-size: 13px; white-space: nowrap; }
  .np-table tbody tr { cursor: pointer; }
  .np-table tbody tr:hover { background: var(--np-surface-3); }
  .np-table tbody tr.sel { background: var(--np-surface-sel); }

  /* Filter bar */
  .np-filterbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px 14px; }
  .np-input { height: 36px; padding: 0 12px; border: 1px solid var(--np-border); border-radius: var(--np-radius-sm); background: var(--np-surface-2); color: var(--np-text); font: inherit; font-size: 13px; outline: none; }
  .np-input:focus { border-color: var(--np-brand); box-shadow: 0 0 0 3px var(--np-focus); }
  .np-fld { display: flex; flex-direction: column; gap: 5px; }
  .np-fld > span { font-size: 11.5px; color: var(--np-text-2); font-weight: 600; }
  .np-fld > .np-input { width: 100%; box-sizing: border-box; }
  .np-facet { position: relative; }
  .np-facet > button { height: 36px; padding: 0 12px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--np-border); border-radius: var(--np-radius-sm); background: var(--np-surface-2); color: var(--np-text-2); font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .np-facet.on > button { border-color: var(--np-brand-soft-bd); background: var(--np-brand-soft); color: var(--np-brand-ink); }
  .np-facet-dd { position: absolute; top: 42px; left: 0; min-width: 210px; background: var(--np-surface); border: 1px solid var(--np-border); border-radius: var(--np-radius); box-shadow: var(--np-shadow-pop); z-index: var(--np-z-dropdown); padding: 6px; max-height: 320px; overflow: auto; }
  .np-opt { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .np-opt:hover { background: var(--np-surface-3); }
  .np-opt .c { margin-left: auto; color: var(--np-text-3); font-size: 12px; }
  .np-chiprow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 0 14px 12px; }
  .np-fchip { display: inline-flex; align-items: center; gap: 6px; height: 26px; padding: 0 6px 0 10px; border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--np-brand-ink); background: var(--np-brand-soft); border: 1px solid var(--np-brand-soft-bd); }
  .np-fchip button { border: none; background: none; color: inherit; cursor: pointer; display: grid; place-items: center; }

  /* Bars / funnel */
  .np-bar-row { display: grid; grid-template-columns: 128px 1fr 84px 46px; align-items: center; gap: 10px; margin: 8px 0; }
  .np-bar-lab { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--np-text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .np-bar-track { height: 14px; background: var(--np-track); border-radius: var(--np-radius-sm); overflow: hidden; }
  .np-bar-fill { height: 100%; border-radius: var(--np-radius-sm); transition: width var(--np-dur-slow) var(--np-ease); }
  .np-bar-v { font-size: 12.5px; font-weight: 700; text-align: right; }
  .np-bar-p { font-size: 11px; color: var(--np-text-3); text-align: right; }
  .np-funnel-row { margin: 10px 0; }
  .np-funnel-track { height: 26px; background: var(--np-track); border-radius: var(--np-radius-sm); overflow: hidden; }

  /* Pager */
  .np-pager { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--np-text-3); font-size: 13px; }
  .np-pager button { height: 32px; min-width: 32px; padding: 0 10px; border: 1px solid var(--np-border); background: var(--np-surface); color: var(--np-text); border-radius: var(--np-radius-sm); cursor: pointer; font: inherit; }
  .np-pager button.on { background: var(--np-brand-fill); color: #fff; border-color: transparent; }
  .np-pager button:disabled { opacity: 0.4; cursor: default; }

  /* Drawer */
  .np-scrim { position: fixed; inset: var(--np-topbar-h) 0 0 0; background: var(--np-overlay); z-index: var(--np-z-drawer-scrim); opacity: 0; pointer-events: none; transition: opacity var(--np-dur); }
  .np-scrim.open { opacity: 1; pointer-events: auto; }
  .np-drawer { position: fixed; top: var(--np-topbar-h); right: 0; width: var(--np-drawer-w); max-width: 92vw; height: calc(100vh - var(--np-topbar-h)); background: var(--np-surface); box-shadow: var(--np-shadow-drawer); z-index: var(--np-z-drawer); transform: translateX(100%); transition: transform var(--np-dur-slow) var(--np-ease); overflow-y: auto; }
  .np-drawer.open { transform: none; }
  .np-drawer-h { background: var(--np-surface-2); padding: 16px 18px; border-bottom: 1px solid var(--np-divider); }
  .np-kv { display: grid; grid-template-columns: 92px 1fr; gap: 1px 10px; background: var(--np-border); border: 1px solid var(--np-border); border-radius: var(--np-radius); overflow: hidden; }
  .np-kv .k, .np-kv .v { background: var(--np-surface); padding: 8px 10px; font-size: 12.5px; }
  .np-kv .k { color: var(--np-text-3); }
  .np-sec-t { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--np-text-3); font-weight: 700; margin: 18px 0 8px; }
  .np-contact { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--np-divider); }
  .np-mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  .np-empty { text-align: center; padding: 48px 20px; color: var(--np-text-3); }

  /* ---- Mobile responsiveness ---- */
  .np-navscrim { display: none; }
  @media (max-width: 860px) {
    .np-nav { position: fixed; top: var(--np-topbar-h); left: 0; bottom: 0; height: auto; width: 264px; flex-basis: 264px; padding: 12px 10px; transform: translateX(-100%); transition: transform .25s var(--np-ease, ease); z-index: var(--np-z-drawer); box-shadow: var(--np-shadow-drawer); overflow-y: auto; }
    .np-shell.nav-mobile-open .np-nav { transform: translateX(0); }
    .np-shell .np-nav-row { justify-content: flex-start !important; padding: 0 12px !important; height: 38px; }
    .np-shell .np-nav-row span, .np-shell .np-nav-eyebrow, .np-shell .np-nav-count { display: revert !important; }
    .np-navscrim { display: block; position: fixed; inset: var(--np-topbar-h) 0 0 0; background: var(--np-overlay, rgba(0,0,0,.45)); z-index: calc(var(--np-z-drawer) - 1); opacity: 0; pointer-events: none; transition: opacity .25s; }
    .np-shell.nav-mobile-open .np-navscrim { opacity: 1; pointer-events: auto; }
    .np-main { padding: 16px 12px; min-width: 0; }
    .np-grid { grid-template-columns: 1fr !important; }
    .np-kpis { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
    .np-h1 { font-size: 20px; }
    .np-head { flex-wrap: wrap; gap: 10px; }
    .np-drawer { width: 100%; max-width: 100%; }
    .np-topbar { padding: 0 10px; gap: 6px; }
    .np-topbar .np-avatar + div { display: none; }
    .np-topbar .np-tsearch { display: none; }  /* searchbar fora em mobile (a classe era np-tsearch, não np-search) */
  }
  @media (max-width: 520px) {
    .np-topbar .np-search, .np-topbar .np-word { display: none; }
    .np-main { padding: 12px 8px; }
    .np-card-b { padding: 12px; }
    /* topbar: manter só o essencial (refresh/tema/sino); esconder import+definições */
    #importbtn, #setbtn { display: none; }
    .np-table th, .np-table td { font-size: 12px; padding: 0 10px; }
    .np-h1 { font-size: 18px; }
    .np-head { align-items: flex-start; }
    .np-kpi-v { font-size: 20px; }
  }
  @media (max-width: 380px) {
    .np-kpis { grid-template-columns: 1fr !important; }
  }
  /* Secções expansíveis (VMs/CTs/Docker/serviços/crons) nos cards e drawers de Servidor */
  .np-details { margin-top: 8px; border-top: 1px dashed var(--np-border); padding-top: 6px; }
  .np-details > summary { cursor: pointer; font-size: 9px; text-transform: uppercase; letter-spacing: .04em; color: var(--np-text-2, #6b7280); list-style: none; user-select: none; display: flex; align-items: center; }
  .np-details > summary::-webkit-details-marker { display: none; }
  .np-details > summary::before { content: '▸'; display: inline-block; margin-right: 5px; transition: transform .15s ease; }
  .np-details[open] > summary::before { transform: rotate(90deg); }
  /* Grelha de Servidores: 2 cartões por linha em desktop (mais largos, menos altos); 1 em mobile. */
  .np-grid.np-grid--2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  @media (max-width: 880px) { .np-grid.np-grid--2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="np-topbar">
  <div style="display:flex;align-items:center">
    <button class="np-iconbtn" id="hambtn" title="Menu (abrir/fechar)"><span data-ic="menu"></span></button>
    <a class="np-brand" href="#/overview"><span class="np-brandmark"><i></i></span><span class="np-word">Net<span style="color:var(--np-brand)">Prospect</span></span></a>
  </div>
  <form class="np-tsearch" id="gsearchform"><span data-ic="search"></span><input id="gsearch" placeholder="Procurar domínios ou empresas… (Enter)" autocomplete="off" /><button type="button" class="np-mic" id="micbtn" title="Falar (voz → texto)"><span data-ic="mic"></span></button></form>
  <div style="display:flex;align-items:center">
    <button class="np-iconbtn" id="refreshbtn" title="Atualizar agora"><span data-ic="refresh"></span></button>

function goSearch(q) { q = (q || '').trim(); if (!q) return; captureEvent('dashboard_search_submitted', { query_length: q.length, route: currentRouteName() }); location.hash = '#/directory?q=' + encodeURIComponent(q); }

(function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = $('#micbtn');
  if (!SR) { btn.title = 'Reconhecimento de voz não suportado neste browser'; btn.style.opacity = '0.5'; return; }
  const rec = new SR(); rec.lang = 'pt-PT'; rec.interimResults = true; rec.continuous = false;
  let listening = false;
  rec.onresult = (ev) => { const txt = Array.from(ev.results).map((r) => r[0].transcript).join(''); $('#gsearch').value = txt; };
  rec.onend = () => { listening = false; btn.classList.remove('rec'); const v = $('#gsearch').value.trim(); if (v) goSearch(v); };
  rec.onerror = () => { listening = false; btn.classList.remove('rec'); };
  btn.onclick = () => { if (listening) { rec.stop(); return; } try { rec.start(); listening = true; btn.classList.add('rec'); $('#gsearch').value = ''; $('#gsearch').placeholder = 'A ouvir…'; } catch (e) {} };
})();

function verifBadge(status, verified) {

  if (status === 'invalid' || status === 'no_mx') return `<span class="np-badge neutral">${ic('x', 13)}Inválido</span>`;
  return `<span class="np-badge neutral">${ic('dash', 13)}Não verif.</span>`;
}

// ========== SUBSCRIÇÕES (produtos Netmaster) ==========

let SUB = { edit: null, list: [], refs: { segments: [], campaigns: [], clients: [] } };
const eur = (n) => (n == null || n === '' ? '—' : '€ ' + Number(n).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
const subFreqLabel = (f) => (SUB_FREQ.find((x) => x[0] === f) || [f, f])[1];
async function viewSubscriptions() {
  if (!STATS) STATS = await api('/api/stats');
  renderNav('subscriptions');
  const head = `<div class="np-head"><div><div class="np-eyebrow">Comercial</div><h1 class="np-h1">Subscrições</h1><div class="np-sub">Pacotes que a Netmaster oferece — preço c/ e s/ IVA (23%), pontos, ICPs, segmentos, clientes, campanhas e templates de email</div></div>${SUB.edit ? '' : `<button class="np-btn np-btn--primary" onclick="subNew()">+ Novo pacote</button>`}</div>`;
  let data; try { data = await api('/api/subscriptions'); } catch (e) { $('#view').innerHTML = head + errCard(e); return; }
  SUB.refs = data.refs || { segments: [], campaigns: [], clients: [] };
  if (SUB.edit) { $('#view').innerHTML = head + `<div id="sub-editor">${subEditorHtml()}</div>`; return; }
  const subs = data.subscriptions || [];
  SUB.list = subs;
  if (!subs.length) { $('#view').innerHTML = head + `<div class="np-empty">Ainda não há pacotes. Cria o primeiro com “+ Novo pacote”.</div>`; return; }
  $('#view').innerHTML = head + `<div class="np-grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">${subs.map(subCardHtml).join('')}</div>`;
}
function subMolChip(s) {
  if (!s.moloni_service_id) return `<span class="np-chip" style="height:18px;border-color:var(--np-warn,#d97706);color:var(--np-warn,#d97706)" title="sem produto Moloni — não fatura">sem produto Moloni</span>`;
  const p = (SUB.refs.products || []).find((x) => String(x.moloni_id) === String(s.moloni_service_id));
  return `<span class="np-chip" style="height:18px;border-color:var(--np-ok-mark,#16a34a);color:var(--np-ok-mark,#16a34a)" title="produto/serviço Moloni ligado (faturação)">Moloni: ${esc(p?.name || ('#' + s.moloni_service_id))}</span>`;
}
function subCardHtml(s) {
  const feats = (s.features || []).slice(0, 5);
  const rel = (arr, label) => (arr && arr.length ? `<span class="np-chip" style="height:18px">${arr.length} ${label}</span>` : '');
  return `<section class="np-card" style="${s.active === false ? 'opacity:.55' : ''}"><div class="np-card-b">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:8px"><div><div style="font-weight:800;font-size:15px">${esc(s.name)}</div><div class="muted" style="font-size:11.5px">${subFreqLabel(s.frequency)}${s.category ? ' · ' + esc(s.category) : ''}${s.active === false ? ' · inativo' : ''}</div></div>
      <span style="text-align:right"><div style="font-weight:800">${eur(s.price_ex_vat)}</div><div class="muted" style="font-size:10.5px">${eur(s.price_inc_vat)} c/IVA</div></span></div>
    ${feats.length ? `<ul style="margin:10px 0 0;padding-left:16px;font-size:12px;color:var(--np-text-2)">${feats.map((f) => `<li>${esc(f)}</li>`).join('')}${(s.features || []).length > 5 ? `<li class="muted">+${s.features.length - 5}…</li>` : ''}</ul>` : ''}
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">${rel(s.icps, 'ICP')}${rel(s.segment_ids, 'seg')}${rel(s.client_ids, 'clientes')}${rel(s.campaign_ids, 'camp')}${rel(s.email_templates, 'templates')}${subMolChip(s)}</div>
    <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap"><button class="np-btn np-btn--sm" onclick="subEdit(${s.id})">Editar</button>${(s.segment_ids || []).length ? `<button class="np-btn np-btn--sm np-btn--primary" onclick="subCampaign(${s.id})">${ic('send', 12)} Criar campanha</button>` : ''}<button class="np-btn np-btn--sm" onclick="subDelete(${s.id},'${esc((s.name || '').replace(/'/g, ''))}')">Apagar</button></div>
  </div></section>`;
}
function subEditorHtml() {
  const s = SUB.edit;
  const freqSel = `<select class="np-input" id="sub-frequency">${SUB_FREQ.map(([v, l]) => `<option value="${v}" ${s.frequency === v ? 'selected' : ''}>${l}</option>`).join('')}</select>`;

    <div><label class="muted" style="font-size:11px">Preço s/ IVA (€)</label><br><input class="np-input" id="sub-ex" type="number" step="0.01" value="${s.price_ex_vat ?? ''}" oninput="subCalcVat(false)" style="width:130px"></div>
    <div><label class="muted" style="font-size:11px">Preço c/ IVA 23% (€)</label><br><input class="np-input" id="sub-inc" type="number" step="0.01" value="${s.price_inc_vat ?? ''}" oninput="subCalcVat(true)" style="width:130px"></div></div>`;

  const cls = relBox('Clientes', SUB.refs.clients || [], s.client_ids || [], 'client_ids', (it) => esc(it.name || it.org_domain || ('#' + it.id)), 'subToggle');
  const camps = relBox('Campanhas', SUB.refs.campaigns || [], s.campaign_ids || [], 'campaign_ids', (it) => esc(it.name) + (it.angle ? ` <span class="muted">(${esc(it.angle)})</span>` : ''), 'subToggle');
  const tplSel = relBox('Templates de email (da colecção)', SUB.refs.templates || [], s.template_ids || [], 'template_ids', (it) => esc(it.name), 'subToggle');
  const sec = (t, inner) => `<div style="margin-top:16px"><div class="np-sec-t" style="margin:0 0 8px">${t}</div>${inner}</div>`;
  // Produto/serviço Moloni (faturação): escolher um sincronizado OU criar a partir desta subscrição.
  const prods = SUB.refs.products || [];
  const molOpts = ['<option value="">— sem produto —</option>'].concat(prods.map((p) =>
    `<option value="${p.moloni_id}" ${String(s.moloni_service_id ?? '') === String(p.moloni_id) ? 'selected' : ''}>${esc(p.name || ('#' + p.moloni_id))}${p.reference ? ' · ' + esc(p.reference) : ''}${p.price != null ? ' · €' + p.price : ''}</option>`)).join('');
  const molBox = `<div class="muted" style="font-size:11px;margin-bottom:8px">A subscrição fatura por este produto/serviço Moloni — necessário para gerar a VD/avença. <a href="#/moloni-produtos" style="color:var(--np-brand-ink)">Ver produtos</a></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select class="np-input" id="sub-moloni" style="min-width:320px">${molOpts}</select>
      <button class="np-btn np-btn--sm" type="button" onclick="subCreateMoloniProduct()">Criar no Moloni a partir desta subscrição</button>
      <span id="sub-mol-msg" class="muted" style="font-size:11px"></span></div>
    ${s.moloni_service_id ? '' : '<div class="np-badge warn" style="height:auto;padding:4px 8px;margin-top:8px;font-size:11px">Sem produto Moloni — não poderá gerar faturação até ligar um.</div>'}`;
  return `<div class="np-card"><div class="np-card-b" style="max-width:840px">
    <div style="display:grid;grid-template-columns:1fr 150px 190px;gap:10px">
      <div><label class="muted" style="font-size:11px">Nome do pacote</label><input class="np-input" id="sub-name" value="${esc(s.name || '')}" placeholder="ex.: Manutenção WordPress" style="width:100%"></div>

      <div><label class="muted" style="font-size:11px">Categoria</label>${catSel}</div>
    </div>
    ${sec('Preço', price)}

window.subNew = () => { SUB.edit = { frequency: 'monthly', features: [], segment_ids: [], client_ids: [], campaign_ids: [], icp_ids: [], template_ids: [], active: true }; viewSubscriptions(); };
window.subEdit = async (id) => { const data = await api('/api/subscriptions'); SUB.refs = data.refs || SUB.refs; const s = (data.subscriptions || []).find((x) => x.id === id); if (!s) return; SUB.edit = { ...s, features: s.features || [], segment_ids: s.segment_ids || [], client_ids: s.client_ids || [], campaign_ids: s.campaign_ids || [], icp_ids: s.icp_ids || [], template_ids: s.template_ids || [] }; viewSubscriptions(); };
window.subCancel = () => { SUB.edit = null; viewSubscriptions(); };
// Cria um produto/serviço no Moloni a partir do nome+preço da subscrição e liga-o (moloni_service_id).
window.subCreateMoloniProduct = async () => {
  subReadDom(); const s = SUB.edit;
  const setMsg = (t) => { const m = document.getElementById('sub-mol-msg'); if (m) m.textContent = t; };
  if (!s.name) return setMsg('Falta o nome da subscrição.');
  if (s.price_ex_vat == null || s.price_ex_vat === '') return setMsg('Falta o preço s/IVA.');
  setMsg('a criar no Moloni…');
  try {
    const ref = ((s.category || 'SUB') + '-' + s.name).replace(/\s+/g, '-').slice(0, 30);
    const r = await api('/api/moloni/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: s.name, price: s.price_ex_vat, type: 'servico', reference: ref }) });
    const pid = r.result?.product_id;
    if (!pid) throw new Error('sem product_id na resposta');
    s.moloni_service_id = String(pid);
    (SUB.refs.products = SUB.refs.products || []).push({ moloni_id: pid, name: s.name, reference: ref, price: s.price_ex_vat, kind: 'service' });
    subRerender();
    const m = document.getElementById('sub-mol-msg'); if (m) m.textContent = 'produto criado (#' + pid + ') e ligado — Guarda para persistir.';
  } catch (e) { setMsg('erro: ' + e.message); }
};
function subReadDom() {
  const s = SUB.edit; if (!s) return; const g = (id) => document.getElementById(id);
  if (g('sub-name')) s.name = g('sub-name').value.trim();
  if (g('sub-frequency')) s.frequency = g('sub-frequency').value;
  if (g('sub-category')) s.category = g('sub-category').value.trim();
  if (g('sub-features')) s.features = g('sub-features').value.split('\n').map((x) => x.trim()).filter(Boolean);
  if (g('sub-ex')) s.price_ex_vat = g('sub-ex').value === '' ? null : parseFloat(g('sub-ex').value);
  if (g('sub-inc')) s.price_inc_vat = g('sub-inc').value === '' ? null : parseFloat(g('sub-inc').value);
  if (g('sub-notes')) s.notes = g('sub-notes').value;
  if (g('sub-active')) s.active = g('sub-active').checked;
  if (g('sub-moloni')) s.moloni_service_id = g('sub-moloni').value || null;
}
function subRerender() { const el = document.getElementById('sub-editor'); if (el) el.innerHTML = subEditorHtml(); }
window.subCalcVat = (fromInc) => { const ex = document.getElementById('sub-ex'), inc = document.getElementById('sub-inc'); const r2 = (v) => Math.round(v * 100) / 100; if (fromInc) { const v = parseFloat(inc.value); ex.value = isNaN(v) ? '' : r2(v / 1.23); } else { const v = parseFloat(ex.value); inc.value = isNaN(v) ? '' : r2(v * 1.23); } };
window.subAddIcp = () => { subReadDom(); SUB.edit.icps.push(''); subRerender(); };
window.subDelIcp = (i) => { subReadDom(); SUB.edit.icps.splice(i, 1); subRerender(); };
window.subAddTpl = () => { subReadDom(); SUB.edit.email_templates.push({ name: '', subject: '', body: '' }); subRerender(); };
window.subDelTpl = (i) => { subReadDom(); SUB.edit.email_templates.splice(i, 1); subRerender(); };
window.subToggle = (kind, id) => { subReadDom(); const arr = SUB.edit[kind]; const i = arr.map(Number).indexOf(Number(id)); if (i >= 0) arr.splice(i, 1); else arr.push(Number(id)); };
window.subSave = async () => {
  subReadDom(); const s = SUB.edit; const msg = document.getElementById('sub-msg');
  if (!s.name) { if (msg) msg.textContent = 'Falta o nome.'; return; }
  if (msg) msg.textContent = 'a guardar…';
  const body = { name: s.name, frequency: s.frequency, category: s.category, features: s.features, price_ex_vat: s.price_ex_vat, price_inc_vat: s.price_inc_vat, segment_ids: s.segment_ids, client_ids: s.client_ids, campaign_ids: s.campaign_ids, icp_ids: s.icp_ids, template_ids: s.template_ids, active: s.active, notes: s.notes, moloni_service_id: s.moloni_service_id ?? null };
  try {
    if (s.id) await api('/api/subscriptions/' + s.id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    else await api('/api/subscriptions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    captureEvent('subscription_saved', { id: s.id || 'new', frequency: s.frequency });
    SUB.edit = null; viewSubscriptions();
  } catch (e) { if (msg) msg.textContent = 'erro: ' + e.message; }
};
window.subDelete = async (id, name) => { if (!confirm('Apagar o pacote “' + name + '”?')) return; await api('/api/subscriptions/' + id, { method: 'DELETE' }); viewSubscriptions(); };
// Criar campanha a partir de um pacote: escolhe um segmento (audiência) + conteúdo (IA por ângulo,
// ou um dos templates do pacote → preenche os e-mails com variáveis substituídas).
window.subCampaign = (id) => {
  const s = (SUB.list || []).find((x) => x.id === id); if (!s) return;
  const segs = (SUB.refs.segments || []).filter((seg) => (s.segment_ids || []).map(Number).includes(Number(seg.id)));
  const tpls = (SUB.refs.templates || []).filter((t) => (s.template_ids || []).map(Number).includes(Number(t.id)));
  const dw = $('#drawer'); $('#scrim').classList.add('open'); dw.classList.add('open');
  const hd = `<div class="np-drawer-h" style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-size:16px;font-weight:800">Criar campanha</div><div class="muted" style="font-size:12px">${esc(s.name)}</div></div><button class="np-iconbtn" style="border-color:var(--np-border)" onclick="closeDrawer()">${ic('x', 16)}</button></div>`;
  if (!segs.length) { dw.innerHTML = hd + `<div class="np-empty">Este pacote não tem segmentos. Adiciona segmentos ao pacote (Editar) primeiro.</div>`; return; }
  const lab = (t) => `<label class="muted" style="font-size:11px;display:block;margin:10px 0 3px">${t}</label>`;
  dw.innerHTML = hd + `<div style="padding:14px 16px">
    ${lab('Segmento (audiência) — os filtros do directório desse segmento')}
    <select id="sc-seg" class="np-input" style="width:100%">${segs.map((seg) => `<option value="${seg.id}">${esc(seg.name)}</option>`).join('')}</select>
    ${lab('Conteúdo do email')}
    <select id="sc-tpl" class="np-input" style="width:100%">
      <option value="ai">Gerar por IA (ângulo — refinas na campanha)</option>
      ${tpls.map((t) => `<option value="${t.id}">Template: ${esc(t.name || ('#' + t.id))}</option>`).join('')}
    </select>
    ${tpls.length ? `<div class="muted" style="font-size:11px;margin-top:4px">Com template, os e-mails são preenchidos já (variáveis {{name}}, {{company}}, {{domain}}, {{city}}, {{industry}}, {{seo_score}}… substituídas por contacto) e ficam prontos a enviar.</div>` : ''}
    ${lab('Remetente')}
    <input id="sc-from-name" class="np-input" style="width:100%;margin-bottom:6px" placeholder="Nome (ex.: Equipa Netmaster)">
    <input id="sc-from-email" class="np-input" style="width:100%;margin-bottom:6px" placeholder="Email de envio (ex.: ola@netmaster.pt)">
    <input id="sc-reply" class="np-input" style="width:100%" placeholder="Reply-to (opcional)">
    <div style="display:flex;gap:8px;margin-top:16px"><button class="np-btn np-btn--primary" onclick="subCampaignSubmit(${id})">Criar campanha</button><button class="np-btn" onclick="closeDrawer()">Cancelar</button><span id="sc-msg" class="muted" style="font-size:12px;align-self:center"></span></div>
    <div class="muted" style="font-size:11px;margin-top:12px">A campanha abre a seguir para reveres, gerares (se IA) e enviares.</div>
  </div>`;
};
window.subCampaignSubmit = async (id) => {
  const g = (x) => document.getElementById(x); const msg = g('sc-msg');
  const tplVal = g('sc-tpl').value;
  const body = { segmentId: g('sc-seg').value, from_name: g('sc-from-name').value.trim(), from_email: g('sc-from-email').value.trim(), reply_to: g('sc-reply').value.trim() };
  if (tplVal !== 'ai') body.templateId = parseInt(tplVal, 10);
  msg.textContent = 'a criar…';
  try {
    const r = await api('/api/subscriptions/' + id + '/campaign', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    captureEvent('subscription_campaign_created', { subscription_id: id, mode: r.mode, filled: r.filled });
    closeDrawer(); location.hash = '#/campaigns?id=' + r.campaignId;
  } catch (e) { msg.textContent = 'erro: ' + e.message; }
};

// Multi-seleção reutilizável (relações por ids). toggleFn(kind, id) atualiza o estado da página.
function relBox(label, items, sel, kind, fmtItem, toggleFn) {
  return `<div><div class="muted" style="font-size:11px;margin-bottom:4px">${label}</div><div style="max-height:150px;overflow:auto;border:1px solid var(--np-border);border-radius:8px;padding:6px">${(items || []).length ? items.map((it) => `<label style="display:flex;gap:6px;align-items:center;font-size:12.5px;padding:2px 0"><input type="checkbox" ${(sel || []).map(Number).includes(Number(it.id)) ? 'checked' : ''} onchange="${toggleFn}('${kind}',${it.id})"> ${fmtItem(it)}</label>`).join('') : '<span class="muted" style="font-size:12px">nenhum</span>'}</div></div>`;
}

  if (!STATS) STATS = await api('/api/stats'); renderNav('icps');

let TPL = { edit: null, list: [], refs: {}, f: {}, lastField: 'tpl-body' };
async function viewTemplates() {
  if (!STATS) STATS = await api('/api/stats'); renderNav('templates');
  const head = `<div class="np-head"><div><div class="np-eyebrow">Comercial</div><h1 class="np-h1">Templates de email</h1><div class="np-sub">Assunto + corpo com {{variáveis}} do dataset dos contactos · tags, categorias, tipo de negócio, língua · ligações a ICPs, segmentos, clientes, campanhas e contactos</div></div>${TPL.edit ? '' : `<button class="np-btn np-btn--primary" onclick="tplNew()">+ Novo template</button>`}</div>`;
  let data; try { data = await api('/api/email-templates'); } catch (e) { $('#view').innerHTML = head + errCard(e); return; }
  TPL.refs = data.refs || {}; TPL.list = data.items || [];
  if (TPL.edit) { $('#view').innerHTML = head + `<div id="tpl-editor">${tplEditorHtml()}</div>`; return; }
  if (!TPL.list.length) { $('#view').innerHTML = head + `<div class="np-empty">Ainda não há templates. Cria o primeiro com “+ Novo template”.</div>`; return; }
  // Filtros por relação
  const uniq = (arr) => [...new Set(arr.filter(Boolean))].sort();
  const cats = uniq(TPL.list.map((t) => t.category)), biz = uniq(TPL.list.map((t) => t.business_type)), langs = uniq(TPL.list.map((t) => t.language)), tags = uniq(TPL.list.flatMap((t) => t.tags || []));
  const opt = (val, cur) => `<option value="${esc(val)}" ${cur === val ? 'selected' : ''}>${esc(val)}</option>`;
  const sel = (k, label, vals) => `<select class="np-input" style="min-width:130px" onchange="tplFilter('${k}',this.value)"><option value="">${label}: todos</option>${vals.map((v) => opt(v, TPL.f[k])).join('')}</select>`;
  const relSel = (k, label, items, fmt) => `<select class="np-input" style="min-width:150px" onchange="tplFilter('${k}',this.value)"><option value="">${label}: todos</option>${(items || []).map((it) => `<option value="${it.id}" ${String(TPL.f[k]) === String(it.id) ? 'selected' : ''}>${esc(fmt(it))}</option>`).join('')}</select>`;
  const filters = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${relSel('icp', 'ICP', TPL.refs.icps, (i) => i.name)}${relSel('segment', 'Segmento', TPL.refs.segments, (i) => i.name)}${sel('category', 'Categoria', cats)}${sel('business_type', 'Tipo de negócio', biz)}${sel('language', 'Língua', langs)}${sel('tag', 'Tag', tags)}${Object.values(TPL.f).some(Boolean) ? `<button class="np-btn np-btn--sm" onclick="tplFilterClear()">Limpar</button>` : ''}</div>`;
  const rows = TPL.list.filter(tplMatch);
  const grid = rows.length ? `<div class="np-grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">${rows.map(tplCardHtml).join('')}</div>` : `<div class="np-empty">Nenhum template com estes filtros.</div>`;
  $('#view').innerHTML = head + filters + grid;
}
function tplMatch(t) {
  const f = TPL.f;
  if (f.icp && !(t.icp_ids || []).map(Number).includes(Number(f.icp))) return false;
  if (f.segment && !(t.segment_ids || []).map(Number).includes(Number(f.segment))) return false;
  if (f.category && t.category !== f.category) return false;
  if (f.business_type && t.business_type !== f.business_type) return false;
  if (f.language && t.language !== f.language) return false;
  if (f.tag && !(t.tags || []).includes(f.tag)) return false;
  return true;
}
window.tplFilter = (k, v) => { TPL.f[k] = v || ''; viewTemplates(); };
window.tplFilterClear = () => { TPL.f = {}; viewTemplates(); };

// ---------- bars ----------
function barRows(items, colorFn, showPct = true) {
  const max = Math.max(1, ...items.map((i) => i.count));
  const total = items.reduce((a, i) => a + i.count, 0);
  return items.map((i) => `<div class="np-bar-row">
    <span class="np-bar-lab">${i.dot ? `<span class="np-dot" style="background:${colorFn(i)}"></span>` : ''}${esc(i.name)}</span>
    <div class="np-bar-track"><div class="np-bar-fill" style="width:${pct(i.count, max).toFixed(1)}%;background:${colorFn(i)}"></div></div>
    <span class="np-bar-v tnum">${fmt(i.count)}</span>
    ${showPct ? `<span class="np-bar-p tnum">${pct(i.count, total).toFixed(0)}%</span>` : '<span></span>'}
  </div>`).join('');
}

const AUDIT_KEYS = ['has_email', 'has_phone', 'dm', 'lead_min', 'lead_max', 'city', 'cpanel', 'notcpanel', 'fb', 'ig', 'li', 'tw', 'gmb', 'wa', 'pin', 'yt', 'tk', 'load', 'spf', 'dmarc', 'authboth', 'traffic', 'industry', 'seo_max', 'mobile', 'desktop', 'security', 'sev', 'wpvuln', 'ssl_expiring', 'ssl_expired', 'ssl_paid', 'ssl_ov', 'ssl_wildcard', 'domain_expiring', 'domain_renew', 'cms_outdated', 'isp', 'client', 'match'];

function auditFacetsHtml(st, px) {
  const dd = (key, label, active, inner) => `<div class="np-facet ${active ? 'on' : ''}"><button onclick="${px}Facet('${key}')">${label} ${ic('chevD', 14)}</button>${st.openFacet === key ? `<div class="np-facet-dd">${inner}</div>` : ''}</div>`;

function auditChips(st) {
  const L = { has_email: 'Tem email', has_phone: 'Tem telefone', cpanel: 'cPanel', notcpanel: 'Sem cPanel', fb: 'Facebook', ig: 'Instagram', li: 'LinkedIn', tw: 'Twitter/X', gmb: 'Google Business', wa: 'WhatsApp', pin: 'Pinterest', yt: 'YouTube', tk: 'TikTok', spf: 'SPF com problemas', dmarc: 'DMARC com problemas', authboth: 'SPF e DMARC (ambos)' };
  const out = [];
  if (st.dm) out.push(['dm', 'Tem decisor']);
  if (st.lead_min) out.push(['lead_min', 'Lead ≥ ' + st.lead_min]);
  if (st.lead_max) out.push(['lead_max', 'Lead < ' + st.lead_max]);
  for (const k of ['has_email', 'has_phone', 'cpanel', 'notcpanel', 'fb', 'ig', 'li', 'tw', 'gmb', 'wa', 'pin', 'yt', 'tk', 'spf', 'dmarc', 'authboth']) if (st[k]) out.push([k, L[k]]);
  if (st.city) out.push(['city', 'Cidade: ' + st.city]);
  if (st.load) out.push(['load', 'Velocidade: ' + st.load.replace(/,/g, ', ')]);
  if (st.traffic) out.push(['traffic', 'Tráfego: ' + st.traffic.replace(/,/g, ', ')]);
  if (st.industry) out.push(['industry', 'Atividade: ' + (INDUSTRIES.find((x) => x[0] === st.industry)?.[1] || st.industry)]);
  if (st.seo_max) out.push(['seo_max', 'SEO fraco']);
  if (st.mobile) out.push(['mobile', 'Mobile não-friendly']);
  if (st.desktop) out.push(['desktop', 'Desktop não-friendly']);
  if (st.security) out.push(['security', 'Problemas de segurança']);
  if (st.sev) out.push(['sev', 'Severidade: ' + st.sev.replace(/,/g, ', ')]);
  if (st.wpvuln) out.push(['wpvuln', 'WordPress com vulns']);
  if (st.ssl_expiring) out.push(['ssl_expiring', 'Certificado a expirar']);
  if (st.ssl_expired) out.push(['ssl_expired', 'Certificado expirado']);
  if (st.ssl_paid) out.push(['ssl_paid', 'SSL pago']);
  if (st.ssl_ov) out.push(['ssl_ov', 'SSL OV/EV']);
  if (st.ssl_wildcard) out.push(['ssl_wildcard', 'SSL wildcard']);
  if (st.domain_expiring) out.push(['domain_expiring', 'Domínio a expirar']);
  if (st.domain_renew) out.push(['domain_renew', 'Renova ≤ ' + st.domain_renew + 'd']);
  if (st.cms_outdated) out.push(['cms_outdated', 'CMS desatualizado']);
  if (st.isp) out.push(['isp', 'ISP: ' + st.isp]);
  if (st.client) out.push(['client', st.client === 'true' ? 'É cliente' : 'Não é cliente']);
  if (st.match === 'any') out.push(['match', 'Combinar: OU (qualquer)']);
  return out;
}
// Célula de sinais de prospeção para as tabelas.
function signalsCell(s) {
  const sig = (t, cls, title) => `<span class="np-badge ${cls}" style="height:18px;padding:0 5px;font-size:10px" title="${title}">${t}</span>`;
  const b = [];
  if (s.has_email) b.push(sig('@', 'ok', 'tem email'));
  if (s.has_phone) b.push(sig('☎', 'ok', 'tem telefone'));
  if (s.social_facebook) b.push(sig('f', 'brand', 'Facebook'));
  if (s.social_instagram) b.push(sig('ig', 'brand', 'Instagram'));
  if (s.social_linkedin) b.push(sig('in', 'brand', 'LinkedIn'));
  if (s.social_twitter) b.push(sig('x', 'brand', 'Twitter/X'));
  if (s.gmb) b.push(sig('G', 'brand', 'Google Business'));
  if (s.is_cpanel) b.push(sig('cP', 'neutral', 'cPanel'));
  if (['missing', 'weak', 'invalid'].includes(s.spf_status)) b.push(sig('SPF', 'warn', 'SPF: ' + s.spf_status));
  if (['missing', 'weak', 'invalid'].includes(s.dmarc_status)) b.push(sig('DMARC', 'warn', 'DMARC: ' + s.dmarc_status));
  if (s.ssl_days_left != null && s.ssl_days_left <= 30) b.push(sig('SSL', 'warn', 'certificado expira em ' + s.ssl_days_left + 'd'));
  if (s.expiring_soon) b.push(sig('⏳', 'warn', 'domínio a expirar'));
  if (s.cms_outdated) b.push(sig('CMS↓', 'warn', 'CMS desatualizado' + (s.cms_version ? ' (' + s.cms_version + ')' : '')));
  return b.length ? `<div style="display:flex;gap:3px;flex-wrap:wrap">${b.join('')}</div>` : '<span class="muted">—</span>';
}
// Emblema de lead score (0-100) com cor por escalão.
function leadBadge(score) {
  if (score == null) return '<span class="muted">—</span>';
  const cls = score >= 60 ? 'ok' : score >= 40 ? 'brand' : score >= 20 ? 'info' : 'neutral';
  return `<span class="np-badge ${cls}" style="min-width:30px;justify-content:center" title="lead score">${score}</span>`;
}

// Sparkline SVG minimal (série de {ts,v} numéricos, 0-100 típico) → linha inline.
function sparkline(points, { w = 240, h = 34 } = {}) {
  const pts = points.filter((p) => typeof p.v === 'number');
  if (pts.length < 2) return '';
  const xs = pts.map((p) => p.ts), ys = pts.map((p) => p.v);
  const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
  const nx = (x) => x1 === x0 ? w : ((x - x0) / (x1 - x0)) * (w - 4) + 2;
  const ny = (y) => y1 === y0 ? h / 2 : h - 3 - ((y - y0) / (y1 - y0)) * (h - 6);
  const dpath = pts.map((p, i) => `${i ? 'L' : 'M'}${nx(p.ts).toFixed(1)},${ny(p.v).toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible"><path d="${dpath}" fill="none" stroke="var(--np-brand)" stroke-width="2"/><circle cx="${nx(last.ts).toFixed(1)}" cy="${ny(last.v).toFixed(1)}" r="2.5" fill="var(--np-brand)"/></svg>`;
}
// Carrega timeline (histórico lead_score) + gatilhos do site → #np-timeline.
async function loadTimeline(domain) {
  const el = document.getElementById('np-timeline'); if (!el) return;
  try {
    const [tl, tg] = await Promise.all([
      api('/api/timeline?domain=' + encodeURIComponent(domain)),
      api('/api/triggers?domain=' + encodeURIComponent(domain) + '&limit=12&since=365'),
    ]);
    if (!tl.enabled) return; // analytics desligado → nada
    const scoreSeries = (tl.series?.lead_score || []).map((o) => ({ ts: o.ts, v: typeof o.v === 'number' ? o.v : Number(o.v) }));
    const triggers = tg.triggers || [];
    const nPoints = scoreSeries.length;
    if (!nPoints && !triggers.length) return; // sem histórico ainda
    const spark = nPoints >= 2 ? `<div style="display:flex;align-items:center;gap:10px;margin:2px 0 6px"><span class="muted" style="font-size:12px">Lead score</span>${sparkline(scoreSeries)}<b class="tnum">${scoreSeries[scoreSeries.length - 1].v}</b></div>` : '';
    const trg = triggers.map((t) => `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px"><span class="np-badge ${SEV_CLASS[t.severity] || 'neutral'}" style="height:18px">${esc(TRIGGER_LABEL[t.event] || t.event)}</span><span class="muted tnum">${esc(String(t.old_value))}→${esc(String(t.new_value))}</span><span class="muted" style="margin-left:auto">${timeAgo(Number(t.ts))}</span></div>`).join('');
    el.innerHTML = `<div class="np-sec-t">Histórico & mudanças</div>${spark}${trg || (nPoints ? `<div class="muted" style="font-size:12px">${nPoints} observaç${nPoints === 1 ? 'ão' : 'ões'} · sem mudanças ainda.</div>` : '')}`;
  } catch { /* silencioso */ }
}
// Auditoria pesada on-demand. `only` (ex.: 'wpscan') corre só esse passo.
window.auditNow = async (domain, only) => {
  const id = only ? only + 'btn' : 'auditbtn';
  const LBL = { wpscan: 'WPScan', ssllabs: 'SSL Labs' };
  const btn = $('#' + id); if (btn) { btn.disabled = true; btn.textContent = 'A enfileirar…'; }
  try {
    await api('/api/audit/' + encodeURIComponent(domain) + (only ? '?only=' + encodeURIComponent(only) : ''), { method: 'POST' });
    captureEvent('audit_requested', { domain, route: currentRouteName(), requested_steps: only || 'all' });
    if (btn) btn.textContent = 'Em fila ✓';
  } catch (e) {
    captureFrontendError(e, { action: 'single_audit_request', route: currentRouteName(), requested_steps: only || 'all' });
    if (btn) { btn.disabled = false; btn.textContent = LBL[only] || 'Auditar agora'; }
  }
};

// --- Edição de contacto (reclassificar general↔pessoa + "não contactar") ------

  const dnc = !!c.do_not_contact;
  const isGen = c.role_category === 'general' || c.role === 'general';
  const roleBadge = (c.role && c.role !== 'general')
    ? `<span class="np-badge ${DM.has(c.role) ? 'brand' : 'neutral'}" style="height:18px">${DM.has(c.role) ? ic('star', 11) : ''}${esc(c.role)}</span>`
    : (isGen ? '<span class="np-badge info" style="height:18px">Empresa</span>' : '');
  return `<div class="np-contact" id="np-c-${c.id}" style="${dnc ? 'opacity:.55' : ''}">
    <span class="np-avatar" style="width:30px;height:30px;background:${isGen ? 'var(--np-neutral-mark)' : CAT('info')}">${esc((c.name || '?').slice(0, 1))}</span>
    <div style="flex:1"><div style="font-weight:700">${esc(c.name || '—')} ${roleBadge} ${c.maybe_person && !c.reviewed ? '<span class="np-badge" style="height:18px;background:#e67e22;color:#fff" title="local-part não-genérico ≠ marca → pode ser uma pessoa; clica ✎ para reclassificar">parece pessoa?</span>' : ''} ${c.reviewed ? '<span class="np-badge neutral" style="height:18px" title="revisto manualmente">✓ revisto</span>' : ''} ${dnc ? '<span class="np-badge" style="height:18px;background:#c0392b;color:#fff">não contactar</span>' : ''}</div>
      <div style="margin:3px 0">${verifBadge(c.email_status, c.email_verified)}</div>
      <div class="muted" style="font-size:12px">${c.email ? `<a href="mailto:${esc(c.email)}" style="color:var(--np-brand-ink)">${esc(c.email)}</a>` : ''} ${esc(c.phone || '')}</div></div>
    ${c.id != null ? `<button class="np-iconbtn" style="border-color:var(--np-border)" title="Editar / reclassificar" onclick="editContact('${c.id}')">✎</button>` : ''}</div>`;
}
// Linha "Atividade" editável no drawer do site — correção manual da área de atividade quando o
// classificador erra. Guarda via PATCH /api/sites/:id/industry (grava confidence=1 = revisto).
function industryRow(site) {
  const label = INDUSTRIES.find((x) => x[0] === site.industry)?.[1] || site.industry;
  const reviewed = Number(site.industry_confidence) >= 1;
  const conf = site.industry_confidence != null && !reviewed ? ` <span class="muted" style="font-size:11px" title="confiança do classificador">${Math.round(site.industry_confidence * 100)}%</span>` : '';
  const val = site.industry ? `<span class="np-badge info" style="height:20px">${esc(label)}</span>${conf}${reviewed ? ' <span class="np-badge neutral" style="height:18px" title="corrigido manualmente — não é re-classificado">✓ revisto</span>' : ''}` : '<span class="muted">— sem classificação</span>';
  return `<div class="np-kv" id="np-ind-box" style="margin-top:6px"><div class="k">Atividade</div><div class="v">${val} <button class="np-iconbtn" style="border-color:var(--np-border)" title="Corrigir atividade" onclick="editIndustry()">✎</button></div></div>`;
}

function segFilterChips(f) {
  f = f || {}; const c = [];
  if (f.q) c.push('“' + f.q + '”');
  if (f.qualified) c.push(f.qualified === 'true' ? 'Qualificado' : 'Não qualif.');
  if (f.platform) c.push(f.platform); if (f.country) c.push('País: ' + f.country);
  for (const [, l] of auditChips(f)) c.push(l);
  return c.slice(0, 8).map((x) => `<span class="np-chip">${esc(x)}</span>`).join('') || '<span class="muted" style="font-size:12px">sem filtros</span>';
}

function chatAppend(who, html, persist = true) { const box = $('#ag_chat'); if (!box) return; const align = who === 'user' ? 'flex-end' : 'flex-start'; const bg = who === 'user' ? 'var(--np-brand-soft)' : 'var(--np-surface-2)'; box.insertAdjacentHTML('beforeend', `<div style="align-self:${align};max-width:88%;background:${bg};border-radius:12px;padding:10px 12px;font-size:13px">${html}</div>`); box.scrollTop = box.scrollHeight; if (persist) { CHAT_HISTORY.push({ who, html }); try { sessionStorage.setItem('np_chat', JSON.stringify(CHAT_HISTORY.slice(-100))); } catch (e) {} } }
// Repõe o histórico do chat (persiste entre navegações via sessionStorage). Mostra a saudação se vazio.
function chatReplay() { const box = $('#ag_chat'); if (!box) return; box.innerHTML = ''; if (!CHAT_HISTORY.length) { chatAppend('bot', CHAT_GREETING, false); return; } for (const m of CHAT_HISTORY) chatAppend(m.who, m.html, false); }
window.chatClear = () => { CHAT_HISTORY = []; try { sessionStorage.removeItem('np_chat'); } catch (e) {} chatReplay(); };

};

  const f = o.funnel || {}, camps = o.campaigns || [], recent = o.recent || [];
  const base = f.generated || f.total || 0;
  const openRate = f.sent ? Math.round((f.opened / f.sent) * 100) : 0;
  const clickRate = f.sent ? Math.round((f.clicked / f.sent) * 100) : 0;
  const kpi = (l, v, sub) => `<div class="np-kpi"><div class="np-kpi-l">${l}</div><div class="np-kpi-v tnum">${v}</div>${sub ? `<div class="muted" style="font-size:11px;margin-top:2px">${sub}</div>` : ''}</div>`;

  const funnel = steps.map(([lab, k]) => { const v = f[k] || 0; const pc = base ? Math.round((v / base) * 100) : 0; return `<div class="np-bar-row"><span class="np-bar-lab">${lab}</span><div class="np-bar-track"><div class="np-bar-fill" style="width:${pc}%;background:var(--np-brand)"></div></div><span class="np-bar-v tnum">${fmt(v)}</span><span class="np-bar-p tnum">${pc}%</span></div>`; }).join('');

  const angleChips = Object.entries(o.byAngle || {}).sort((a, b) => b[1] - a[1]).map(([k, v]) => `<span class="np-chip">${esc(k)} · ${fmt(v)}</span>`).join(' ');
  const phaseChips = PHASE_ORDER.map((p) => `<span class="np-chip">${PHASE_LABEL[p]} · ${fmt((o.byPhase || {})[p] || 0)}</span>`).join(' ');

  const campTable = (rows) => `<div class="np-tablewrap"><table class="np-table"><thead><tr><th>Nome</th><th>Ângulo</th><th>Estado</th><th style="text-align:right">Gerados</th><th style="text-align:right">Enviados</th><th style="text-align:right">Abertos</th><th style="text-align:right">Cliques</th></tr></thead><tbody>${rows.map(campRow).join('')}</tbody></table></div>`;
  const phaseSections = PHASE_ORDER.filter((p) => byPhase[p].length).map((p) => `<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${phaseBadge(p)}<span class="muted" style="font-size:12px">${byPhase[p].length} campanha(s)</span></div>${campTable(byPhase[p])}</div>`).join('');

    <div class="np-kpis">

      ${kpi('Emails gerados', fmt(f.generated || 0))}
      ${kpi('Enviados', fmt(f.sent || 0))}
      ${kpi('Taxa abertura', openRate + '%', `${fmt(f.opened || 0)} abertos`)}
      ${kpi('Taxa cliques', clickRate + '%', `${fmt(f.clicked || 0)} cliques`)}
    </div>
    <div class="np-grid" style="grid-template-columns:repeat(auto-fit,minmax(360px,1fr));margin-top:16px">

    // Erros de rede transitórios (fetch abortado por navegação, blip de rede) → uma tentativa automática antes de desistir.
    const transient = /Failed to fetch|fetch failed|NetworkError|load failed|aborted|ERR_NETWORK/i.test((e && e.message) || '');
    if (transient && _retry !== true) { await new Promise((r) => setTimeout(r, 600)); if (seq === ROUTE_SEQ) return route(true); return; }
    captureFrontendError(e, { action: 'route_load', route: h });
    $('#view').innerHTML = `<div class="np-empty">Não foi possível carregar esta página.<div class="muted" style="font-size:12px;margin:6px 0">${esc((e && e.message) || 'erro desconhecido')}</div><button class="np-btn np-btn--sm np-btn--primary" style="margin-top:8px" onclick="route()">Tentar de novo</button></div>`;
  }
  if (parseHashQuery().notif) openNotifications(); // deep-link p/ notificações
}
// Auto-refresh global (10s) das páginas de dados. NÃO refresca ferramentas (import/agents/
// settings), nem enquanto se edita um campo, nem com um drawer aberto; preserva o scroll.
let REFRESHING = false;
  const NO_AUTOREFRESH = new Set(['import', 'agents', 'chat', 'settings', 'coverage', 'data-coverage', 'logs', 'subscriptions', 'icps', 'templates']);
window.addEventListener('hashchange', route);
route();
setInterval(() => {
  const h = (location.hash || '#/overview').slice(2).split('?')[0] || 'overview';
  if (NO_AUTOREFRESH.has(h)) return;
  const ae = document.activeElement;
  if (ae && ['INPUT', 'TEXTAREA', 'SELECT'].includes(ae.tagName)) return;
  if ($('#drawer').classList.contains('open')) return;
  REFRESHING = true; const y = window.scrollY; Promise.resolve(route()).then(() => window.scrollTo(0, y)).finally(() => { REFRESHING = false; });
}, 10000);
</script>
