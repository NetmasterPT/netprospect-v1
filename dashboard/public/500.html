<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Erro — NetProspect</title>
<style>
  :root { --bg:#f7f8fa; --card:#fff; --tx:#1b2130; --mut:#6b7280; --brand:#4f46e5; --bd:#e5e7eb; --err:#dc2626; }
  @media (prefers-color-scheme: dark) { :root { --bg:#0d1017; --card:#151a23; --tx:#e6e9ef; --mut:#9aa3b2; --brand:#818cf8; --bd:#232a36; --err:#f87171; } }
  * { box-sizing:border-box; } html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--tx); font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; display:grid; place-items:center; padding:24px; }
  .card { background:var(--card); border:1px solid var(--bd); border-radius:16px; padding:40px 34px; max-width:440px; width:100%; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.08); }
  .brand { font-weight:800; font-size:19px; letter-spacing:-.02em; margin-bottom:22px; }
  .brand b { color:var(--brand); }
  .code { font-size:64px; font-weight:800; line-height:1; letter-spacing:-.04em; color:var(--err); }
  h1 { font-size:19px; margin:14px 0 8px; }
  p { color:var(--mut); margin:0 0 24px; }
  button.btn { background:var(--brand); color:#fff; border:0; padding:11px 22px; border-radius:10px; font-weight:600; font-size:15px; cursor:pointer; }
  button.btn:hover { filter:brightness(1.08); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Net<b>Prospect</b></div>
    <div class="code">500</div>
    <h1>Algo correu mal</h1>
    <p>Ocorreu um erro no servidor. Já foi registado. Tenta novamente dentro de instantes.</p>
    <button class="btn" onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
