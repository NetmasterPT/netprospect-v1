# Plataforma de docs & conhecimento — servida sob netprospect.netmaster.pt/docs/ (NPMplus faz proxy).
# F2: docs-web. F5: qdrant + kb-http (RAG/busca). F6 acrescenta: open-notebook.
# Padrão de portas (LAN/TAILNET/127.0.0.1) copiado de deploy/server/docker-compose.yml (Documenso).
services:
  docs-web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ../../docs-site/dist:/usr/share/nginx/html:ro   # build estático (gerado por deploy/docs/build.sh)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${LAN_IP:-127.0.0.1}:8088:80"
      - "${TAILNET_IP:-127.0.0.1}:8088:80"
      - "127.0.0.1:8088:80"

  # --- F5: Context-Mode (RAG) ---
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "${TAILNET_IP:-127.0.0.1}:6333:6333"   # tailnet (agentes/ingest), nunca público
      - "127.0.0.1:6333:6333"

  # Embeddings in-process (transformers.js/ONNX, multilingue) — não usa o Ollama.
  # NB: usa docs-site/node_modules construído no host (onnxruntime-node linux-x64/glibc = node:20-slim).
  kb-http:
    image: node:20-slim
    restart: unless-stopped
    working_dir: /app/docs-site
    command: ["node", "mcp/server.mjs"]
    environment:
      QDRANT_URL: http://qdrant:6333
      KB_EMBED_BACKEND: ${KB_EMBED_BACKEND:-local}   # embeddings LOCAIS (transformers.js) — não usa OLLAMA_URL
      HF_HOME: /hf-cache                        # cache do modelo (download 1x na 1ª query)
      KB_HTTP_HOST: 0.0.0.0
      KB_HTTP_PORT: "8099"
      DOCS_PROFILE: ${DOCS_PROFILE:-interno}    # perfil ativo → filtro de módulos na federação
      OLLAMA_URL: ${OLLAMA_URL:-http://100.126.196.112:11434}   # chat (gemma3:4b); só o /chat o usa
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      DOCS_OLLAMA_ENABLED: ${DOCS_OLLAMA_ENABLED:-1}             # flag: 0/off desliga o provider ollama
      # Escalada Open Notebook (F3): kb-http→API pela rede npdocs (nome de serviço interno, NÃO o
      # OPEN_NOTEBOOK_API_URL do .env que é o API_URL ts.net do browser); deep-link = URL público.
      OPEN_NOTEBOOK_INTERNAL_URL: ${OPEN_NOTEBOOK_INTERNAL_URL:-http://open-notebook:5055}
      OPEN_NOTEBOOK_PUBLIC_URL: ${OPEN_NOTEBOOK_PUBLIC_URL:-https://netprospect.notebook.netmaster.pt}
      POSTHOG_PUBLIC_KEY: ${POSTHOG_PUBLIC_KEY:-}                # $ai + /posthog-config p/ o SPA (fail-soft se vazio)
      POSTHOG_PUBLIC_HOST: ${POSTHOG_PUBLIC_HOST:-https://eu.i.posthog.com}
      # Providers de IA — cloud API (chat.mjs) + auth reencaminhada para os CLIs em Docker (F2). Vazio = dormente.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_AUTH_TOKEN: ${CODEX_AUTH_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_OAUTH_TOKEN: ${GOOGLE_OAUTH_TOKEN:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROK_TOKEN: ${GROK_TOKEN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      CURSOR_TOKEN: ${CURSOR_TOKEN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
    volumes:
      - ../..:/app:ro                           # repo (node_modules + kb/ + content.json)
      - hf-cache:/hf-cache
      # F2 (CLIs em Docker): descomentar p/ o kb-http lançar os containers dos CLIs — precisa de docker-cli na
      # imagem e é acesso ~root ao host (ver deploy/cli/README.md; preferir runner dedicado em prod aberta).
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [qdrant]
    ports:
      - "${TAILNET_IP:-127.0.0.1}:8099:8099"    # /search p/ o site + agentes por HTTP; tailnet-only
      - "127.0.0.1:8099:8099"

  # Ingestor one-shot (correr após rebuild do conteúdo; via timer ou `docker compose run kb-ingest`).
  kb-ingest:
    image: node:20-slim
    working_dir: /app/docs-site
    command: ["node", "scripts/kb-ingest.mjs"]
    environment:
      QDRANT_URL: http://qdrant:6333
      KB_EMBED_BACKEND: ${KB_EMBED_BACKEND:-local}
      HF_HOME: /hf-cache
    volumes:
      - ../..:/app:ro
      - hf-cache:/hf-cache
    depends_on: [qdrant]
    restart: "no"
    profiles: ["ingest"]                        # não sobe com o `up` normal; corre on-demand

  # --- F6: Open Notebook (NotebookLM self-hosted) em /notebook/ ---
  open-notebook-surreal:
    image: surrealdb/surrealdb:v2
    restart: unless-stopped
    user: "0:0"                                 # o volume nomeado é root-owned; sem isto → PermissionDenied no RocksDB
    command: start --log info --user ${SURREAL_USER:-root} --pass ${SURREAL_PASSWORD:-root} rocksdb:/mydata/onb.db
    environment:
      SURREAL_EXPERIMENTAL_GRAPHQL: "true"
    volumes:
      - onb-surreal:/mydata
    ports:
      - "127.0.0.1:8000:8000"                   # interno (localhost), nunca exposto

  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    restart: unless-stopped
    depends_on: [open-notebook-surreal]
    environment:
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY:?define em deploy/docs/.env}
      # a UI (Streamlit) chama a API pelo BROWSER → API_URL tem de ser alcançável pelo browser (tailnet).
      # Via NPMplus, mudar para a URL proxied (ex.: https://notebook.netmaster.pt/api).
      API_URL: ${OPEN_NOTEBOOK_API_URL:-http://100.114.17.74:5055}
      SURREAL_URL: ws://open-notebook-surreal:8000/rpc
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASSWORD: ${SURREAL_PASSWORD:-root}
      SURREAL_NAMESPACE: open_notebook
      SURREAL_DATABASE: open_notebook
    volumes:
      - onb-data:/app/data
    ports:
      - "127.0.0.1:8502:8502"    # UI (Streamlit) — exposta na tailnet por Tailscale Serve (ts.net:8502)
      - "127.0.0.1:5055:5055"    # REST API — idem (ts.net:5055); API_URL aponta para o URL ts.net (HTTPS)

  # --- F8: Obsidian (web) — navegar/editar o vault online ---
  # Monta um CLONE dedicado do repo (não o checkout dos serviços) para não colidir com o auto-deploy.
  # DOCKER_MODS=…git dá git no container (commit+push do vault pela terminal do Obsidian).
  obsidian-web:
    image: lscr.io/linuxserver/obsidian:latest    # canónica (KasmVNC); o sytone/obsidian-remote:latest usa xrdp e não renderiza em VM headless
    restart: unless-stopped
    shm_size: "1gb"                               # requisito KasmVNC/Electron (senão renderer crasha → ecrã preto)
    security_opt:
      - seccomp:unconfined                        # requisito KasmVNC (sandbox Electron)
    environment:
      PUID: "0"
      PGID: "0"
      TZ: ${TZ:-Europe/Lisbon}
      DOCKER_MODS: linuxserver/mods:universal-git
    volumes:
      - obsidian-config:/config
      - ${OBSIDIAN_VAULT:-/root/np-vault}:/config/vaults/np-vault   # o vault (clone dedicado) dentro de /config
    ports:
      - "${TAILNET_IP:-127.0.0.1}:8091:3001"        # KasmVNC exige HTTPS (contexto seguro) → porto 3001 (self-signed)
      - "127.0.0.1:8091:3001"

  # --- Botão flutuante de restart (overlay nas apps Obsidian/Notebook) ---
  # docker-socket-proxy: expõe SÓ o endpoint de restart de containers (ALLOW_RESTARTS); nega tudo o resto.
  # Não é publicado no host — só alcançável na rede npdocs pelo docs-ctl.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      CONTAINERS: "1"        # acesso à API /containers (necessário p/ o path do restart)
      POST: "1"              # o template 0.3.0 nega POST ANTES do ALLOW_RESTARTS → precisa de POST=1
      ALLOW_RESTARTS: "1"    # (redundante com POST=1, mantido por documentação)
      # POST=1+CONTAINERS=1 abriria outros POST de containers NO PROXY — mas o gate real é a rede
      # isolada `ctl` (só o docs-ctl lá chega; open-notebook/obsidian/kb-http ficam fora) + a
      # whitelist do docs-ctl (que só emite /restart de nomes exatos). Nada mais alcança este proxy.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [ctl]          # SÓ nesta rede isolada — nunca publicado no host

  # docs-ctl: endpoint minúsculo (node built-ins, sem deps) — whitelist de restart + serve o overlay.js.
  # O NPMplus faz proxy de /ctl/ (nos proxy hosts do obsidian/notebook) para aqui; atrás de Authentik.
  docs-ctl:
    image: node:20-slim
    restart: unless-stopped
    command: ["node", "/app/deploy/docs/ctl-server.mjs"]
    environment:
      DOCKER_PROXY_URL: http://docker-socket-proxy:2375
      CTL_PORT: "8097"
      CTL_ALLOW: ${CTL_ALLOW:-npdocs-obsidian-web-1,npdocs-open-notebook-1}
    volumes:
      - ../..:/app:ro
    depends_on: [docker-socket-proxy]
    networks: [ctl]                                   # SÓ ctl (fala com o socket-proxy); a porta publicada é à parte
    ports:
      - "${TAILNET_IP:-127.0.0.1}:8097:8097"          # alcançável pelo NPMplus na tailnet
      - "127.0.0.1:8097:8097"

networks:
  ctl:
    driver: bridge          # rede isolada docs-ctl↔socket-proxy (fora do alcance dos containers de terceiros)

volumes:
  qdrant-data:
  hf-cache:
  onb-surreal:
  onb-data:
  obsidian-config:
