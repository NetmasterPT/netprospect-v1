# Dante SOCKS5 — túnel de saída para os probes SMTP do Reacher (deploy/reacher/docker-compose.yml).
# Escuta SÓ em localhost:1080 (só o Reacher co-locado o usa) e egressa por eth0 (→ NAT do de1-pve →
# IP público 49.12.120.250). Auth por username (o user proxyuser existe no HOST — ver README §2).
#
# Se o host de egress mudar (ex.: escalar para o hel1-docker/FI), ajustar `external` para a interface
# de default-route desse host (`ip route show default`).

logoutput: stderr
internal: 127.0.0.1 port = 1080
external: eth0
socksmethod: username
user.privileged: root
user.unprivileged: nobody

# Só o localhost (o Reacher co-locado) pode usar o proxy; nunca exposto à rede.
client pass {
  from: 127.0.0.0/8 to: 0.0.0.0/0
  log: error
}
socks pass {
  from: 127.0.0.0/8 to: 0.0.0.0/0
  protocol: tcp
  command: connect
  log: error
}
