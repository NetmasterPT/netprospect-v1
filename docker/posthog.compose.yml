# PostHog self-host (Fase E) — OPT-IN, PESADO. Ficheiro SEPARADO do stack
# principal de propósito: PostHog precisa de Postgres + Redis + Kafka + ClickHouse
# próprios (~4-6 GB RAM no total). NÃO arranca com o stack normal.
#
# Objetivo: product analytics do próprio dashboard (funis de uso, retenção) e um
# destino opcional para os change_events (via POSTHOG_HOST/POSTHOG_KEY em lib/metrics.js).
# A deteção de mudança / séries temporais do NetProspect NÃO depende disto — vive
# no ClickHouse do stack principal (perfil `analytics`).
#
# ARRANQUE (só quando houver recursos):
#   1) definir POSTHOG_SECRET_KEY (>=32 chars) no docker/.env
#   2) docker compose -f docker/posthog.compose.yml up -d
#   3) 1.ª vez: correr as migrações →
#        docker compose -f docker/posthog.compose.yml run --rm posthog-web python manage.py migrate
#   4) abrir http://localhost:8000 e criar a conta/organização; copiar a Project
#      API Key para POSTHOG_KEY e POSTHOG_HOST=http://localhost:8000 no .env
#      (os workers passam a enviar np_<evento> por cada gatilho).
#
# NOTA: para produção séria, a instalação "hobby" oficial da PostHog (install.sh)
# é a via recomendada; este ficheiro é um ponto de partida single-node.
name: netprospect-posthog

x-posthog-env: &posthog-env
  DATABASE_URL: postgres://posthog:${POSTHOG_DB_PASSWORD:-change-me-ph}@posthog-db:5432/posthog
  REDIS_URL: redis://posthog-redis:6379/
  CLICKHOUSE_HOST: posthog-clickhouse
  CLICKHOUSE_DATABASE: posthog
  # Explícito: o posthog-clickhouse tem o user `default` SEM password. Sem estes, o PostHog
  # enviava um default hardcoded (não-vazio) → "Code: 516 Authentication failed".
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ''
  CLICKHOUSE_SECURE: 'false'
  CLICKHOUSE_VERIFY: 'false'
  KAFKA_HOSTS: posthog-kafka:9092
  SECRET_KEY: ${POSTHOG_SECRET_KEY:?define POSTHOG_SECRET_KEY no .env (>=32 chars)}
  SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
  DISABLE_SECURE_SSL_REDIRECT: 'true'
  IS_BEHIND_PROXY: 'true'

services:
  posthog-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTHOG_DB_PASSWORD:-change-me-ph}
      POSTGRES_DB: posthog
    volumes:
      - ./.data/posthog/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U posthog']
      interval: 10s
      timeout: 5s
      retries: 5

  posthog-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./.data/posthog/redis:/data

  # Kafka single-node via Redpanda (API Kafka, sem Zookeeper) — mais leve.
  posthog-kafka:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://posthog-kafka:9092
    volumes:
      - ./.data/posthog/kafka:/var/lib/redpanda/data

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./.data/posthog/clickhouse:/var/lib/clickhouse
      - ./clickhouse-config/listen-ipv4.xml:/etc/clickhouse-server/config.d/listen-ipv4.xml:ro

  posthog-web:
    image: posthog/posthog:latest
    restart: unless-stopped
    environment: *posthog-env
    depends_on:
      posthog-db: { condition: service_healthy }
      posthog-redis: { condition: service_started }
      posthog-kafka: { condition: service_started }
      posthog-clickhouse: { condition: service_started }
    ports:
      - '127.0.0.1:8000:8000'

  posthog-worker:
    image: posthog/posthog:latest
    restart: unless-stopped
    command: ./bin/docker-worker-celery --with-scheduler
    environment: *posthog-env
    depends_on:
      - posthog-db
      - posthog-redis
      - posthog-kafka
      - posthog-clickhouse
