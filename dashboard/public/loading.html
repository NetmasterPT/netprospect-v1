<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A carregar — NetProspect</title>
<style>
  :root { --bg:#f7f8fa; --card:#fff; --tx:#1b2130; --mut:#6b7280; --brand:#4f46e5; --bd:#e5e7eb; }
  @media (prefers-color-scheme: dark) { :root { --bg:#0d1017; --card:#151a23; --tx:#e6e9ef; --mut:#9aa3b2; --brand:#818cf8; --bd:#232a36; } }
  * { box-sizing:border-box; } html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--tx); font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; display:grid; place-items:center; padding:24px; }
  .wrap { text-align:center; }
  .brand { font-weight:800; font-size:22px; letter-spacing:-.02em; margin-bottom:26px; }
  .brand b { color:var(--brand); }
  .spin { width:40px; height:40px; margin:0 auto 18px; border:3px solid var(--bd); border-top-color:var(--brand); border-radius:50%; animation:r .8s linear infinite; }
  @keyframes r { to { transform:rotate(360deg); } }
  p { color:var(--mut); margin:0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Net<b>Prospect</b></div>
    <div class="spin"></div>
    <p>A carregar…</p>
  </div>
</body>
</html>
