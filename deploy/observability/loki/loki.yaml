# Loki single-binary (hel1-loki, CT206) — armazém de logs da frota. Storage filesystem (TSDB), 14 dias.
# Recebe push dos shippers Grafana Alloy (por-host). Raspa-se as suas próprias métricas em :3100/metrics.
auth_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /var/lib/loki
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 336h        # 14 dias
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  reject_old_samples: false
  max_label_names_per_series: 30
  allow_structured_metadata: true

compactor:
  working_directory: /var/lib/loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
