<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap">
<link rel="stylesheet" href="tokens/netprospect.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--np-bg); color: var(--np-text); font-family: var(--np-font); -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: var(--np-brand-soft); }
  /* thin, recessive scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--np-border-2); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</helmet>
<div style="min-height:100vh; display:flex; flex-direction:column; background:var(--np-bg); color:var(--np-text); font-family:var(--np-font); font-size:var(--np-fs-body); line-height:var(--np-lh-body);">

  <!-- ============ TOP BAR ============ -->
  <header style="position:sticky; top:0; z-index:var(--np-z-nav); height:var(--np-topbar-h); flex:0 0 auto; display:flex; align-items:center; gap:var(--np-s5); padding:0 var(--np-s5) 0 var(--np-s4); background:var(--np-chrome); border-bottom:1px solid var(--np-chrome-border);">
    <!-- brand -->
    <a href="Overview.dc.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; flex:0 0 auto; padding-right:var(--np-s5); border-right:1px solid var(--np-chrome-border); height:100%;">
      <span style="display:inline-flex; width:28px; height:28px; border-radius:8px; background:var(--np-brand-fill); align-items:center; justify-content:center; box-shadow:var(--np-shadow-brand);">
        <span style="width:12px; height:12px; border:2.5px solid #fff; border-radius:4px; transform:rotate(45deg);"></span>
      </span>
      <span style="font-weight:800; font-size:16px; letter-spacing:-0.01em; color:var(--np-chrome-text);">Net<span style="color:var(--np-brand);">Prospect</span></span>
      <span style="font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--np-chrome-text-2); border:1px solid var(--np-chrome-border); padding:2px 6px; border-radius:4px;">INTERNO</span>
    </a>

    <!-- global search -->
    <div style="flex:1 1 auto; max-width:520px; display:flex; align-items:center; gap:8px; height:34px; padding:0 12px; background:rgba(255,255,255,0.06); border:1px solid var(--np-chrome-border); border-radius:var(--np-radius); color:var(--np-chrome-text-2);">
      <span style="display:inline-flex; opacity:0.8;">{{ searchIcon }}</span>
      <span style="flex:1; font-size:13px;">Procurar domínios, empresas, contactos…</span>
      <span style="font-size:10px; font-weight:700; letter-spacing:0.06em; padding:2px 6px; border:1px solid var(--np-chrome-border); border-radius:4px;">⌘K</span>
    </div>

    <div style="flex:1"></div>

    <!-- theme toggle -->
    <button onClick="{{ toggleTheme }}" aria-label="Alternar tema claro / escuro" title="Alternar tema" style="display:inline-flex; align-items:center; gap:8px; height:34px; padding:0 12px; background:rgba(255,255,255,0.06); border:1px solid var(--np-chrome-border); border-radius:var(--np-radius); color:var(--np-chrome-text); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;" style-hover="background:rgba(255,255,255,0.12)">
      <span style="display:inline-flex;">{{ themeIcon }}</span>
      <span>{{ themeLabel }}</span>
    </button>

    <!-- notifications -->
    <button aria-label="Notificações" style="position:relative; display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; background:transparent; border:1px solid var(--np-chrome-border); border-radius:var(--np-radius); color:var(--np-chrome-text-2); cursor:pointer;" style-hover="color:var(--np-chrome-text); background:rgba(255,255,255,0.06)">
      {{ bellIcon }}
      <span style="position:absolute; top:6px; right:7px; width:7px; height:7px; border-radius:999px; background:var(--np-brand-fill); border:1.5px solid var(--np-chrome);"></span>
    </button>

    <!-- user -->
    <div style="display:flex; align-items:center; gap:9px; padding-left:var(--np-s3); border-left:1px solid var(--np-chrome-border); height:100%;">
      <span style="width:30px; height:30px; border-radius:999px; background:linear-gradient(135deg,#EA0B2A,#F2B234); display:inline-flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:12px;">RA</span>
      <div style="line-height:1.2;">
        <div style="font-size:12px; font-weight:600; color:var(--np-chrome-text);">Rui Almeida</div>
        <div style="font-size:10px; color:var(--np-chrome-text-2);">Sales · Admin</div>
      </div>
    </div>
  </header>

  <!-- ============ BODY: NAV + MAIN ============ -->
  <div style="flex:1 1 auto; display:flex; min-height:0; align-items:flex-start;">

    <!-- left nav -->
    <nav aria-label="Navegação principal" style="position:sticky; top:var(--np-topbar-h); align-self:flex-start; flex:0 0 var(--np-nav-w); width:var(--np-nav-w); height:calc(100vh - var(--np-topbar-h)); background:var(--np-chrome); border-right:1px solid var(--np-chrome-border); display:flex; flex-direction:column; padding:var(--np-s4) var(--np-s3); overflow-y:auto;">

      <div style="padding:0 10px 8px; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--np-chrome-text-2);">Explorar</div>
      <sc-for list="{{ navMain }}" as="item" hint-placeholder-count="4">
        <a href="{{ item.href }}" style="{{ item.style }}" style-hover="{{ item.hoverStyle }}">
          <span style="display:inline-flex; width:18px; justify-content:center; color:{{ item.iconColor }};">{{ item.icon }}</span>
          <span style="flex:1;">{{ item.label }}</span>
          <sc-if value="{{ item.count }}" hint-placeholder-val="">
            <span style="font-size:11px; font-weight:600; font-variant-numeric:tabular-nums; color:{{ item.countColor }};">{{ item.count }}</span>
          </sc-if>
        </a>
      </sc-for>

      <div style="padding:18px 10px 8px; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--np-chrome-text-2);">Guardado</div>
      <sc-for list="{{ navSaved }}" as="item" hint-placeholder-count="3">
        <a href="{{ item.href }}" style="{{ item.style }}" style-hover="{{ item.hoverStyle }}">
          <span style="display:inline-flex; width:8px; height:8px; border-radius:999px; background:{{ item.dot }}; flex:0 0 auto; margin:0 5px;"></span>
          <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ item.label }}</span>
          <span style="font-size:11px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--np-chrome-text-2);">{{ item.count }}</span>
        </a>
      </sc-for>

      <div style="flex:1;"></div>

      <a href="Settings.dc.html" style="{{ settingsStyle }}" style-hover="{{ settingsHover }}">
        <span style="display:inline-flex; width:18px; justify-content:center; color:{{ settingsIconColor }};">{{ gearIcon }}</span>
        <span style="flex:1;">Definições</span>
      </a>

      <!-- data freshness -->
      <div style="margin-top:10px; padding:10px 11px; border-radius:var(--np-radius); background:rgba(255,255,255,0.04); border:1px solid var(--np-chrome-border);">
        <div style="display:flex; align-items:center; gap:7px; font-size:11px; color:var(--np-chrome-text);">
          <span style="width:7px; height:7px; border-radius:999px; background:var(--np-ok-mark); box-shadow:0 0 0 3px rgba(34,197,94,0.18);"></span>
          Base sincronizada
        </div>
        <div style="margin-top:4px; font-size:10px; color:var(--np-chrome-text-2);">78 240 sites · há 12 min</div>
      </div>
    </nav>

    <!-- main content slot -->
    <main style="flex:1 1 auto; min-width:0; min-height:calc(100vh - var(--np-topbar-h)); display:flex; flex-direction:column;">
      {{ children }}
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;directory&quot;,&quot;contacts&quot;,&quot;segments&quot;,&quot;settings&quot;],&quot;default&quot;:&quot;overview&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { theme: 'dark' };

  componentDidMount() {
    let t = 'dark';
    try { t = localStorage.getItem('np-theme') || 'dark'; } catch (e) {}
    this.applyTheme(t);
  }

  applyTheme(t) {
    try { document.documentElement.setAttribute('data-theme', t); } catch (e) {}
    try { localStorage.setItem('np-theme', t); } catch (e) {}
    this.setState({ theme: t });
  }

  toggleTheme = () => {
    this.applyTheme(this.state.theme === 'dark' ? 'light' : 'dark');
  };

  // ---- Lucide-style icon builder (2px stroke, currentColor) ----
  icon(name, size = 18) {
    const P = {
      overview: ['M3 3v18h18', 'M18 17V9', 'M13 17V5', 'M8 17v-3'],
      directory: ['M3 5c0 1.66 4 3 9 3s9-1.34 9-3', 'M3 5c0-1.66 4-3 9-3s9 1.34 9 3v14c0 1.66-4 3-9 3s-9-1.34-9-3Z', 'M3 12c0 1.66 4 3 9 3s9-1.34 9-3'],
      contacts: ['M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2', 'M22 21v-2a4 4 0 0 0-3-3.87', 'M16 3.13a4 4 0 0 1 0 7.75'],
      segments: ['m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.57 3.9a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z', 'm22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65', 'm22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65'],
      gear: ['M4 21v-7', 'M4 10V3', 'M12 21v-9', 'M12 8V3', 'M20 21v-5', 'M20 12V3', 'M1 14h6', 'M9 8h6', 'M17 16h6'],
      search: ['M11 11m-8 0a8 8 0 1 0 16 0a8 8 0 1 0-16 0', 'm21 21-4.3-4.3'],
      bell: ['M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9', 'M10.3 21a1.94 1.94 0 0 0 3.4 0'],
      sun: ['M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0-8 0', 'M12 2v2', 'M12 20v2', 'm4.9 4.9 1.4 1.4', 'm17.7 17.7 1.4 1.4', 'M2 12h2', 'M20 12h2', 'm6.3 17.7-1.4 1.4', 'm19.1 4.9-1.4 1.4'],
      moon: ['M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z'],
    };
    const paths = (P[name] || []).map((d, i) =>
      React.createElement('path', { key: i, d }));
    return React.createElement('svg', {
      width: size, height: size, viewBox: '0 0 24 24', fill: 'none',
      stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
      style: { display: 'block' }
    }, paths);
  }

  navRow(active) {
    const base = {
      display: 'flex', alignItems: 'center', gap: '10px', height: '38px',
      padding: '0 10px', borderRadius: 'var(--np-radius)', textDecoration: 'none',
      fontSize: '13px', fontWeight: active ? 700 : 500, marginBottom: '2px',
      position: 'relative', transition: 'background var(--np-dur) var(--np-ease), color var(--np-dur) var(--np-ease)',
      color: active ? 'var(--np-chrome-text)' : 'var(--np-chrome-text-2)',
      background: active ? 'var(--np-chrome-2)' : 'transparent',
      boxShadow: active ? 'inset 3px 0 0 var(--np-brand)' : 'none',
    };
    return base;
  }

  renderVals() {
    const active = this.props.active || 'overview';
    const hover = 'color:var(--np-chrome-text); background:var(--np-chrome-2)';

    const mk = (key, label, href, iconName, count, countColor) => {
      const isA = active === key;
      return {
        label, href, count,
        icon: this.icon(iconName),
        iconColor: isA ? 'var(--np-brand)' : 'inherit',
        style: this.navRow(isA),
        hoverStyle: isA ? '' : hover,
        countColor: countColor || (isA ? 'var(--np-chrome-text-2)' : 'var(--np-chrome-text-2)'),
      };
    };

    const navMain = [
      mk('overview', 'Visão geral', 'Overview.dc.html', 'overview', null),
      mk('directory', 'Diretório de negócios', 'Directory.dc.html', 'directory', '78 240'),
      mk('contacts', 'Contactos', 'Contacts.dc.html', 'contacts', '61 903'),
      mk('segments', 'Segmentos', 'Segments.dc.html', 'segments', '12'),
    ];

    const seg = (label, href, dot, count) => {
      const isA = false;
      return {
        label, href, dot, count,
        style: this.navRow(false),
        hoverStyle: hover,
      };
    };
    const navSaved = [
      seg('WooCommerce · sem contacto', 'Directory.dc.html', 'var(--cat-woocommerce)', '4 118'),
      seg('WordPress hosted @ OVH', 'Directory.dc.html', 'var(--cat-wordpress)', '9 442'),
      seg('Qualificados · e-mail verif.', 'Directory.dc.html', 'var(--np-ok-mark)', '2 706'),
    ];

    const settingsActive = active === 'settings';
    return {
      children: this.props.children,
      navMain, navSaved,
      searchIcon: this.icon('search', 16),
      bellIcon: this.icon('bell', 18),
      gearIcon: this.icon('gear', 18),
      themeIcon: this.icon(this.state.theme === 'dark' ? 'sun' : 'moon', 16),
      themeLabel: this.state.theme === 'dark' ? 'Claro' : 'Escuro',
      toggleTheme: this.toggleTheme,
      settingsStyle: this.navRow(settingsActive),
      settingsHover: settingsActive ? '' : hover,
      settingsIconColor: settingsActive ? 'var(--np-brand)' : 'inherit',
    };
  }
}
</script>
</body>
</html>
