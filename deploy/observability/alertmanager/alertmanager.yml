global:
  resolve_timeout: 5m

# The root route on which all conditions apply
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

# Receivers
receivers:
  - name: 'default'
    # Add your notification channels here (email, Slack, etc.)
    # For now, just log
    webhook_configs:
      - url: 'http://100.114.17.74:3001/api/alertmanager-webhook'
        send_resolved: true

  - name: 'critical'
    # Configure critical alerts (email, PagerDuty, etc.)
    webhook_configs:
      - url: 'http://100.114.17.74:3001/api/alertmanager-webhook'
        send_resolved: true

  - name: 'warning'
    # Configure warning alerts
    webhook_configs:
      - url: 'http://100.114.17.74:3001/api/alertmanager-webhook'
        send_resolved: true
