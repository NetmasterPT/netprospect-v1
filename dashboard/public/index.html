<!doctype html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NetProspect</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iI0VBMEIyQSIvPjxyZWN0IHg9IjEwLjUiIHk9IjEwLjUiIHdpZHRoPSIxMSIgaGVpZ2h0PSIxMSIgcng9IjIiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSIyLjYiIHRyYW5zZm9ybT0icm90YXRlKDQ1IDE2IDE2KSIvPjwvc3ZnPg==" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="netprospect.css" />
<script>
  // Tema antes do paint (evita flash). Default: dark.
  (function () { try { document.documentElement.setAttribute('data-theme', localStorage.getItem('np-theme') || 'dark'); } catch (e) {} })();
</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  html, body { max-width: 100%; overflow-x: hidden; }
  body { background: var(--np-bg); color: var(--np-text); font-family: var(--np-font); font-size: var(--np-fs-body); line-height: var(--np-lh-body); }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; } ::-webkit-scrollbar-thumb { background: var(--np-border-2); border-radius: 999px; } ::-webkit-scrollbar-track { background: transparent; }
  .tnum { font-variant-numeric: tabular-nums; }
  .muted { color: var(--np-text-3); } .faint { color: var(--np-text-faint); }
  svg { display: block; }

  /* Top bar */
  .np-topbar { position: sticky; top: 0; z-index: var(--np-z-nav); height: var(--np-topbar-h); background: var(--np-chrome); border-bottom: 1px solid var(--np-chrome-border); display: flex; align-items: center; gap: var(--np-s5); padding: 0 var(--np-s5); color: var(--np-chrome-text); display: flex; justify-content: space-between; }
  .np-brand { display: flex; align-items: center; gap: 10px; }
  .np-brandmark { width: 28px; height: 28px; border-radius: 8px; background: var(--np-brand-fill); box-shadow: var(--np-shadow-brand); display: grid; place-items: center; }
  .np-brandmark i { width: 12px; height: 12px; border: 2.5px solid #fff; transform: rotate(45deg); border-radius: 2px; }
  .np-word { font-weight: 800; font-size: 16px; letter-spacing: -0.01em; }
  .np-pilltag { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--np-chrome-text-2); border: 1px solid var(--np-chrome-border); padding: 2px 6px; border-radius: 999px; }
  .np-tsearch { flex: 1; max-width: 520px; height: 34px; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--np-chrome-border); border-radius: var(--np-radius); color: var(--np-chrome-text-2); font-size: 13px; }
  .np-tsearch input { flex: 1; background: none; border: none; color: var(--np-chrome-text); font: inherit; outline: none; }
  .np-kbd { font-size: 10px; border: 1px solid var(--np-chrome-border); border-radius: 4px; padding: 1px 5px; }
  .np-mic { width: 26px; height: 26px; display: grid; place-items: center; border: none; background: transparent; color: var(--np-chrome-text-2); border-radius: 6px; cursor: pointer; }
  .np-mic:hover { background: rgba(255,255,255,0.10); color: var(--np-chrome-text); }
  .np-mic.rec { color: #fff; background: var(--np-brand-fill); animation: micpulse 1s infinite; }
  @keyframes micpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  /* Sidebar colapsada (só ícones) */
  .np-shell.nav-collapsed .np-nav { flex-basis: var(--np-nav-w-collapsed); width: var(--np-nav-w-collapsed); padding-left: 8px; padding-right: 8px; }
  .np-shell.nav-collapsed .np-nav-row { justify-content: center; padding: 0; }
  .np-shell.nav-collapsed .np-nav-row span, .np-shell.nav-collapsed .np-nav-eyebrow { display: none; }
  .np-iconbtn { width: 34px; height: 34px; display: grid; place-items: center; border-radius: var(--np-radius); border: 1px solid var(--np-chrome-border); background: transparent; color: var(--np-chrome-text-2); cursor: pointer; position: relative; margin-right: 10px; }
  .np-iconbtn:hover { background: var(--np-chrome-2); color: var(--np-chrome-text); }
  .np-themebtn { width: auto; padding: 0 12px; gap: 6px; display: flex; align-items: center; font: inherit; font-size: 12px; font-weight: 600; }
  .np-avatar { width: 30px; height: 30px; border-radius: 999px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 12px; background: linear-gradient(135deg, #EA0B2A, #F2B234); }

  /* Shell */
  .np-shell { display: flex; align-items: flex-start; }
  .np-nav { position: sticky; top: var(--np-topbar-h); flex: 0 0 var(--np-nav-w); width: var(--np-nav-w); height: calc(100vh - var(--np-topbar-h)); background: var(--np-chrome); border-right: 1px solid var(--np-chrome-border); overflow-y: auto; padding: var(--np-s4) var(--np-s3); color: var(--np-chrome-text-2); }
  .np-nav-eyebrow { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--np-chrome-text-2); padding: 0 10px; margin: var(--np-s4) 0 var(--np-s2); }
  .np-nav-row { display: flex; align-items: center; gap: 10px; height: 38px; padding: 0 10px; border-radius: var(--np-radius); font-size: 13px; font-weight: 500; color: var(--np-chrome-text-2); cursor: pointer; margin-bottom: 2px; }
  .np-nav-row:hover { background: var(--np-chrome-2); color: var(--np-chrome-text); }
  .np-nav-row.is-active { color: var(--np-chrome-text); background: var(--np-chrome-2); box-shadow: inset 3px 0 0 var(--np-brand); font-weight: 700; }
  .np-nav-row.is-active svg { color: var(--np-brand); }
  .np-nav-count { margin-left: auto; font-size: 11px; font-variant-numeric: tabular-nums; color: var(--np-chrome-text-2); }
  .np-nav-dot { width: 8px; height: 8px; border-radius: 999px; }
  .np-fresh { margin-top: var(--np-s4); background: rgba(255,255,255,0.04); border: 1px solid var(--np-chrome-border); border-radius: var(--np-radius); padding: 10px 12px; font-size: 11px; }
  .np-fresh .d { width: 7px; height: 7px; border-radius: 999px; background: var(--np-ok-mark); box-shadow: 0 0 0 3px rgba(34,197,94,0.18); display: inline-block; margin-right: 6px; }

  .np-main { flex: 1 1 auto; min-width: 0; min-height: calc(100vh - var(--np-topbar-h)); padding: var(--np-s6) 26px; }
  .np-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--np-brand-ink); font-weight: 700; }
  .np-h1 { font-size: var(--np-fs-display); font-weight: 800; letter-spacing: -0.02em; margin: 4px 0 2px; }
  .np-sub { color: var(--np-text-3); font-size: 13px; }
  .np-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }

  /* Cards */
  .np-card { background: var(--np-surface); border: 1px solid var(--np-border); border-radius: var(--np-radius-lg); box-shadow: var(--np-shadow-card); }
  .np-card-h { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--np-divider); }
  .np-card-h h2 { font-size: var(--np-fs-h1); font-weight: 800; margin: 0; }
  .np-card-b { padding: 16px 18px; }
  .np-grid { display: grid; gap: 16px; }

  /* KPI */
  .np-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(184px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .np-kpi { background: var(--np-surface); border: 1px solid var(--np-border); border-radius: var(--np-radius-lg); padding: 15px 16px; box-shadow: var(--np-shadow-card); transition: transform var(--np-dur) var(--np-ease), border-color var(--np-dur); }
  a.np-kpi:hover { transform: translateY(-2px); border-color: var(--np-brand-soft-bd); }
  .np-kpi-l { display: flex; align-items: center; gap: 8px; color: var(--np-text-3); font-size: 12px; }
  .np-kpi-ic { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center; background: var(--np-brand-soft); color: var(--np-brand); }
  .np-kpi-v { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-top: 8px; }

  /* Buttons */
  .np-btn { display: inline-flex; align-items: center; gap: 7px; height: 36px; padding: 0 14px; border-radius: var(--np-radius-sm); font: inherit; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--np-border); background: var(--np-surface-2); color: var(--np-text); }
  .np-btn:hover { border-color: var(--np-border-2); }
  .np-btn--primary { background: var(--np-brand-fill); color: var(--np-on-brand); border-color: transparent; box-shadow: var(--np-shadow-brand); }
  .np-btn--primary:hover { background: var(--np-brand-hover); }
  .np-btn--sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .np-seg { display: inline-flex; background: var(--np-surface-2); border: 1px solid var(--np-border); border-radius: var(--np-radius); padding: 2px; gap: 2px; }
  .np-seg button { height: 26px; padding: 0 12px; border: none; background: none; color: var(--np-text-3); font: inherit; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; }
  .np-seg button.on { background: var(--np-surface); color: var(--np-text); box-shadow: var(--np-shadow-card); }

  /* Badges + chips */
  .np-badge { display: inline-flex; align-items: center; gap: 5px; height: 22px; padding: 0 8px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .np-badge.ok { color: var(--np-ok); background: var(--np-ok-soft); border: 1px solid var(--np-ok-soft-bd); }
  .np-badge.warn { color: var(--np-warn); background: var(--np-warn-soft); border: 1px solid var(--np-warn-soft-bd); }
  .np-badge.info { color: var(--np-info); background: var(--np-info-soft); border: 1px solid var(--np-info-soft-bd); }
  .np-badge.neutral { color: var(--np-neutral); background: var(--np-neutral-soft); border: 1px solid var(--np-neutral-soft-bd); }
  .np-badge.brand { color: var(--np-brand-ink); background: var(--np-brand-soft); border: 1px solid var(--np-brand-soft-bd); }
  .np-chip { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: 999px; font-size: 11px; font-weight: 600; color: var(--np-text-2); background: var(--np-surface-2); border: 1px solid var(--np-border); }
  .np-dot { width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto; }

  /* Tables */
  .np-tablewrap { overflow: auto; }
  table.np-table { width: 100%; border-collapse: collapse; }
  .np-table th { position: sticky; top: 0; z-index: 2; background: var(--np-surface-2); height: 42px; text-align: left; padding: 0 var(--np-cell-x); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--np-text-3); font-weight: 700; border-bottom: 1px solid var(--np-border); white-space: nowrap; }
  .np-table td { height: var(--np-row-h); padding: 0 var(--np-cell-x); border-bottom: 1px solid var(--np-divider); font-size: 13px; white-space: nowrap; }
  .np-table tbody tr { cursor: pointer; }
  .np-table tbody tr:hover { background: var(--np-surface-3); }
  .np-table tbody tr.sel { background: var(--np-surface-sel); }

  /* Filter bar */
  .np-filterbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px 14px; }
  .np-input { height: 36px; padding: 0 12px; border: 1px solid var(--np-border); border-radius: var(--np-radius-sm); background: var(--np-surface-2); color: var(--np-text); font: inherit; font-size: 13px; outline: none; }
  .np-input:focus { border-color: var(--np-brand); box-shadow: 0 0 0 3px var(--np-focus); }
  .np-fld { display: flex; flex-direction: column; gap: 5px; }
  .np-fld > span { font-size: 11.5px; color: var(--np-text-2); font-weight: 600; }
  .np-fld > .np-input { width: 100%; box-sizing: border-box; }
  .np-facet { position: relative; }
  .np-facet > button { height: 36px; padding: 0 12px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--np-border); border-radius: var(--np-radius-sm); background: var(--np-surface-2); color: var(--np-text-2); font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .np-facet.on > button { border-color: var(--np-brand-soft-bd); background: var(--np-brand-soft); color: var(--np-brand-ink); }
  .np-facet-dd { position: absolute; top: 42px; left: 0; min-width: 210px; background: var(--np-surface); border: 1px solid var(--np-border); border-radius: var(--np-radius); box-shadow: var(--np-shadow-pop); z-index: var(--np-z-dropdown); padding: 6px; max-height: 320px; overflow: auto; }
  .np-opt { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .np-opt:hover { background: var(--np-surface-3); }
  .np-opt .c { margin-left: auto; color: var(--np-text-3); font-size: 12px; }
  .np-chiprow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 0 14px 12px; }
  .np-fchip { display: inline-flex; align-items: center; gap: 6px; height: 26px; padding: 0 6px 0 10px; border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--np-brand-ink); background: var(--np-brand-soft); border: 1px solid var(--np-brand-soft-bd); }
  .np-fchip button { border: none; background: none; color: inherit; cursor: pointer; display: grid; place-items: center; }

  /* Bars / funnel */
  .np-bar-row { display: grid; grid-template-columns: 128px 1fr 84px 46px; align-items: center; gap: 10px; margin: 8px 0; }
  .np-bar-lab { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--np-text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .np-bar-track { height: 14px; background: var(--np-track); border-radius: var(--np-radius-sm); overflow: hidden; }
  .np-bar-fill { height: 100%; border-radius: var(--np-radius-sm); transition: width var(--np-dur-slow) var(--np-ease); }
  .np-bar-v { font-size: 12.5px; font-weight: 700; text-align: right; }
  .np-bar-p { font-size: 11px; color: var(--np-text-3); text-align: right; }
  .np-funnel-row { margin: 10px 0; }
  .np-funnel-track { height: 26px; background: var(--np-track); border-radius: var(--np-radius-sm); overflow: hidden; }

  /* Pager */
  .np-pager { display: flex; align-items: center; gap: 10px; padding: 12px 14px; color: var(--np-text-3); font-size: 13px; }
  .np-pager button { height: 32px; min-width: 32px; padding: 0 10px; border: 1px solid var(--np-border); background: var(--np-surface); color: var(--np-text); border-radius: var(--np-radius-sm); cursor: pointer; font: inherit; }
  .np-pager button.on { background: var(--np-brand-fill); color: #fff; border-color: transparent; }
  .np-pager button:disabled { opacity: 0.4; cursor: default; }

  /* Drawer */
  .np-scrim { position: fixed; inset: var(--np-topbar-h) 0 0 0; background: var(--np-overlay); z-index: var(--np-z-drawer-scrim); opacity: 0; pointer-events: none; transition: opacity var(--np-dur); }
  .np-scrim.open { opacity: 1; pointer-events: auto; }
  .np-drawer { position: fixed; top: var(--np-topbar-h); right: 0; width: var(--np-drawer-w); max-width: 92vw; height: calc(100vh - var(--np-topbar-h)); background: var(--np-surface); box-shadow: var(--np-shadow-drawer); z-index: var(--np-z-drawer); transform: translateX(100%); transition: transform var(--np-dur-slow) var(--np-ease); overflow-y: auto; }
  .np-drawer.open { transform: none; }
  .np-drawer-h { background: var(--np-surface-2); padding: 16px 18px; border-bottom: 1px solid var(--np-divider); }
  .np-kv { display: grid; grid-template-columns: 92px 1fr; gap: 1px 10px; background: var(--np-border); border: 1px solid var(--np-border); border-radius: var(--np-radius); overflow: hidden; }
  .np-kv .k, .np-kv .v { background: var(--np-surface); padding: 8px 10px; font-size: 12.5px; }
  .np-kv .k { color: var(--np-text-3); }
  .np-sec-t { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--np-text-3); font-weight: 700; margin: 18px 0 8px; }
  .np-contact { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--np-divider); }
  .np-mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  .np-empty { text-align: center; padding: 48px 20px; color: var(--np-text-3); }

  /* ---- Mobile responsiveness ---- */
  .np-navscrim { display: none; }
  @media (max-width: 860px) {
    .np-nav { position: fixed; top: var(--np-topbar-h); left: 0; bottom: 0; height: auto; width: 264px; flex-basis: 264px; padding: 12px 10px; transform: translateX(-100%); transition: transform .25s var(--np-ease, ease); z-index: var(--np-z-drawer); box-shadow: var(--np-shadow-drawer); overflow-y: auto; }
    .np-shell.nav-mobile-open .np-nav { transform: translateX(0); }
    .np-shell .np-nav-row { justify-content: flex-start !important; padding: 0 12px !important; height: 42px; }
    .np-shell .np-nav-row span, .np-shell .np-nav-eyebrow, .np-shell .np-nav-count { display: revert !important; }
    .np-navscrim { display: block; position: fixed; inset: var(--np-topbar-h) 0 0 0; background: var(--np-overlay, rgba(0,0,0,.45)); z-index: calc(var(--np-z-drawer) - 1); opacity: 0; pointer-events: none; transition: opacity .25s; }
    .np-shell.nav-mobile-open .np-navscrim { opacity: 1; pointer-events: auto; }
    .np-main { padding: 16px 12px; min-width: 0; }
    .np-grid { grid-template-columns: 1fr !important; }
    .np-kpis { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
    .np-h1 { font-size: 20px; }
    .np-head { flex-wrap: wrap; gap: 10px; }
    .np-drawer { width: 100%; max-width: 100%; }
    .np-topbar { padding: 0 10px; gap: 6px; }
    .np-topbar .np-avatar + div { display: none; }
  }
  @media (max-width: 520px) {
    .np-topbar .np-search, .np-topbar .np-word { display: none; }
    .np-main { padding: 12px 8px; }
    .np-card-b { padding: 12px; }
    /* topbar: manter só o essencial (refresh/tema/sino); esconder import+definições */
    #importbtn, #setbtn { display: none; }
    .np-table th, .np-table td { font-size: 12px; padding: 0 10px; }
    .np-h1 { font-size: 18px; }
    .np-head { align-items: flex-start; }
    .np-kpi-v { font-size: 20px; }
  }
  @media (max-width: 380px) {
    .np-kpis { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<header class="np-topbar">
  <div style="display:flex;align-items:center">
    <button class="np-iconbtn" id="hambtn" title="Menu (abrir/fechar)"><span data-ic="menu"></span></button>
    <a class="np-brand" href="#/overview"><span class="np-brandmark"><i></i></span><span class="np-word">Net<span style="color:var(--np-brand)">Prospect</span></span></a>
  </div>
  <form class="np-tsearch" id="gsearchform"><span data-ic="search"></span><input id="gsearch" placeholder="Procurar domínios ou empresas… (Enter)" autocomplete="off" /><button type="button" class="np-mic" id="micbtn" title="Falar (voz → texto)"><span data-ic="mic"></span></button></form>
  <div style="display:flex;align-items:center">
    <button class="np-iconbtn" id="refreshbtn" title="Atualizar agora"><span data-ic="refresh"></span></button>
    <button class="np-iconbtn np-themebtn" id="themebtn"></button>
    <button class="np-iconbtn" id="bellbtn" title="Notificações"><span data-ic="bell"></span></button>
    <button class="np-iconbtn" id="importbtn" title="Importar dados (CSV)"><span data-ic="upload"></span></button>
    <button class="np-iconbtn" id="setbtn" title="Definições"><span data-ic="gear"></span></button>
    <div style="display:flex;align-items:center;gap:8px;margin-left:6px"><span class="np-avatar">RA</span><div style="font-size:12px;line-height:1.2"><div style="font-weight:700;color:var(--np-chrome-text)">Rui Almeida</div><div style="color:var(--np-chrome-text-2)">Sales · Admin</div></div></div>
  </div>
</header>
<div class="np-shell">
  <nav class="np-nav" id="nav"></nav>
  <div class="np-navscrim" id="navscrim"></div>
  <main class="np-main" id="view"></main>
</div>
<div class="np-scrim" id="scrim"></div>
<aside class="np-drawer" id="drawer"></aside>

<script type="module" src="posthog-init.js"></script>
<script>
// ---------- helpers ----------
const $ = (s, r = document) => r.querySelector(s);
const el = (h) => { const t = document.createElement('template'); t.innerHTML = h.trim(); return t.content.firstChild; };
const fmt = (n) => (n == null ? '—' : String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ' '));
const esc = (s) => (s ?? '').toString().replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const pct = (a, b) => (b ? (a / b * 100) : 0);
async function api(p, opts) { const r = await fetch(p, buildApiOpts(opts)); if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.status); return r.json(); }
const CAT = (slug) => `var(--cat-${(slug || 'custom').toLowerCase()}, var(--cat-custom))`;
const analytics = () => window.posthogAnalytics;

  try { analytics()?.captureException?.(error, properties); } catch (e) {}
}
function buildApiOpts(opts = {}) {

// ---------- pesquisa global + voz (Speech-to-Text) ----------
function goSearch(q) { q = (q || '').trim(); if (!q) return; captureEvent('dashboard_search_submitted', { query_length: q.length, route: currentRouteName() }); location.hash = '#/directory?q=' + encodeURIComponent(q); }
$('#gsearchform').addEventListener('submit', (e) => { e.preventDefault(); goSearch($('#gsearch').value); });
(function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = $('#micbtn');
  if (!SR) { btn.title = 'Reconhecimento de voz não suportado neste browser'; btn.style.opacity = '0.5'; return; }
  const rec = new SR(); rec.lang = 'pt-PT'; rec.interimResults = true; rec.continuous = false;
  let listening = false;
  rec.onresult = (ev) => { const txt = Array.from(ev.results).map((r) => r[0].transcript).join(''); $('#gsearch').value = txt; };
  rec.onend = () => { listening = false; btn.classList.remove('rec'); const v = $('#gsearch').value.trim(); if (v) goSearch(v); };
  rec.onerror = () => { listening = false; btn.classList.remove('rec'); };
  btn.onclick = () => { if (listening) { rec.stop(); return; } try { rec.start(); listening = true; btn.classList.add('rec'); $('#gsearch').value = ''; $('#gsearch').placeholder = 'A ouvir…'; } catch (e) {} };
})();

function qualBadge(q) { return q ? `<span class="np-badge ok">${ic('check', 13)}Qualificado</span>` : `<span class="np-badge neutral">${ic('dash', 13)}Não qualif.</span>`; }
function verifBadge(status, verified) {
  if (verified || status === 'valid') return `<span class="np-badge ok">${ic('check', 13)}Verificado</span>`;
  if (status === 'catch_all') return `<span class="np-badge warn">${ic('clock', 13)}Catch-all</span>`;
  if (status === 'role') return `<span class="np-badge info">${ic('globe', 13)}Role-based</span>`;
  if (status === 'invalid' || status === 'no_mx') return `<span class="np-badge neutral">${ic('x', 13)}Inválido</span>`;
  return `<span class="np-badge neutral">${ic('dash', 13)}Não verif.</span>`;
}

// ---------- bars ----------
function barRows(items, colorFn, showPct = true) {
  const max = Math.max(1, ...items.map((i) => i.count));
  const total = items.reduce((a, i) => a + i.count, 0);
  return items.map((i) => `<div class="np-bar-row">
    <span class="np-bar-lab">${i.dot ? `<span class="np-dot" style="background:${colorFn(i)}"></span>` : ''}${esc(i.name)}</span>
    <div class="np-bar-track"><div class="np-bar-fill" style="width:${pct(i.count, max).toFixed(1)}%;background:${colorFn(i)}"></div></div>
    <span class="np-bar-v tnum">${fmt(i.count)}</span>
    ${showPct ? `<span class="np-bar-p tnum">${pct(i.count, total).toFixed(0)}%</span>` : '<span></span>'}
  </div>`).join('');
}

function auditChips(st) {
  const L = { has_email: 'Tem email', has_phone: 'Tem telefone', cpanel: 'cPanel', fb: 'Facebook', ig: 'Instagram', li: 'LinkedIn', tw: 'Twitter/X', gmb: 'Google Business', spf: 'SPF com problemas', dmarc: 'DMARC com problemas' };
  const out = [];
  if (st.dm) out.push(['dm', 'Tem decisor']);
  if (st.lead_min) out.push(['lead_min', 'Lead ≥ ' + st.lead_min]);
  for (const k of ['has_email', 'has_phone', 'cpanel', 'fb', 'ig', 'li', 'tw', 'gmb', 'spf', 'dmarc']) if (st[k]) out.push([k, L[k]]);
  if (st.city) out.push(['city', 'Cidade: ' + st.city]);
  if (st.load) out.push(['load', 'Velocidade: ' + st.load.replace(/,/g, ', ')]);
  if (st.traffic) out.push(['traffic', 'Tráfego: ' + st.traffic.replace(/,/g, ', ')]);
  if (st.industry) out.push(['industry', 'Atividade: ' + (INDUSTRIES.find((x) => x[0] === st.industry)?.[1] || st.industry)]);
  if (st.seo_max) out.push(['seo_max', 'SEO fraco']);
  if (st.mobile) out.push(['mobile', 'Mobile não-friendly']);
  if (st.security) out.push(['security', 'Problemas de segurança']);
  if (st.sev) out.push(['sev', 'Severidade: ' + st.sev.replace(/,/g, ', ')]);
  if (st.wpvuln) out.push(['wpvuln', 'WordPress com vulns']);
  if (st.ssl_expiring) out.push(['ssl_expiring', 'Certificado a expirar']);
  if (st.domain_expiring) out.push(['domain_expiring', 'Domínio a expirar']);
  if (st.cms_outdated) out.push(['cms_outdated', 'CMS desatualizado']);
  if (st.isp) out.push(['isp', 'ISP: ' + st.isp]);
  if (st.client) out.push(['client', st.client === 'true' ? 'É cliente' : 'Não é cliente']);
  return out;
}
// Célula de sinais de prospeção para as tabelas.
function signalsCell(s) {
  const sig = (t, cls, title) => `<span class="np-badge ${cls}" style="height:18px;padding:0 5px;font-size:10px" title="${title}">${t}</span>`;
  const b = [];
  if (s.has_email) b.push(sig('@', 'ok', 'tem email'));
  if (s.has_phone) b.push(sig('☎', 'ok', 'tem telefone'));
  if (s.social_facebook) b.push(sig('f', 'brand', 'Facebook'));
  if (s.social_instagram) b.push(sig('ig', 'brand', 'Instagram'));
  if (s.social_linkedin) b.push(sig('in', 'brand', 'LinkedIn'));
  if (s.social_twitter) b.push(sig('x', 'brand', 'Twitter/X'));
  if (s.gmb) b.push(sig('G', 'brand', 'Google Business'));
  if (s.is_cpanel) b.push(sig('cP', 'neutral', 'cPanel'));
  if (['missing', 'weak', 'invalid'].includes(s.spf_status)) b.push(sig('SPF', 'warn', 'SPF: ' + s.spf_status));
  if (['missing', 'weak', 'invalid'].includes(s.dmarc_status)) b.push(sig('DMARC', 'warn', 'DMARC: ' + s.dmarc_status));
  if (s.ssl_days_left != null && s.ssl_days_left <= 30) b.push(sig('SSL', 'warn', 'certificado expira em ' + s.ssl_days_left + 'd'));
  if (s.expiring_soon) b.push(sig('⏳', 'warn', 'domínio a expirar'));
  if (s.cms_outdated) b.push(sig('CMS↓', 'warn', 'CMS desatualizado' + (s.cms_version ? ' (' + s.cms_version + ')' : '')));
  return b.length ? `<div style="display:flex;gap:3px;flex-wrap:wrap">${b.join('')}</div>` : '<span class="muted">—</span>';
}
// Emblema de lead score (0-100) com cor por escalão.
function leadBadge(score) {
  if (score == null) return '<span class="muted">—</span>';
  const cls = score >= 60 ? 'ok' : score >= 40 ? 'brand' : score >= 20 ? 'info' : 'neutral';
  return `<span class="np-badge ${cls}" style="min-width:30px;justify-content:center" title="lead score">${score}</span>`;
}

// Sparkline SVG minimal (série de {ts,v} numéricos, 0-100 típico) → linha inline.
function sparkline(points, { w = 240, h = 34 } = {}) {
  const pts = points.filter((p) => typeof p.v === 'number');
  if (pts.length < 2) return '';
  const xs = pts.map((p) => p.ts), ys = pts.map((p) => p.v);
  const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
  const nx = (x) => x1 === x0 ? w : ((x - x0) / (x1 - x0)) * (w - 4) + 2;
  const ny = (y) => y1 === y0 ? h / 2 : h - 3 - ((y - y0) / (y1 - y0)) * (h - 6);
  const dpath = pts.map((p, i) => `${i ? 'L' : 'M'}${nx(p.ts).toFixed(1)},${ny(p.v).toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible"><path d="${dpath}" fill="none" stroke="var(--np-brand)" stroke-width="2"/><circle cx="${nx(last.ts).toFixed(1)}" cy="${ny(last.v).toFixed(1)}" r="2.5" fill="var(--np-brand)"/></svg>`;
}
// Carrega timeline (histórico lead_score) + gatilhos do site → #np-timeline.
async function loadTimeline(domain) {
  const el = document.getElementById('np-timeline'); if (!el) return;
  try {
    const [tl, tg] = await Promise.all([
      api('/api/timeline?domain=' + encodeURIComponent(domain)),
      api('/api/triggers?domain=' + encodeURIComponent(domain) + '&limit=12&since=365'),
    ]);
    if (!tl.enabled) return; // analytics desligado → nada
    const scoreSeries = (tl.series?.lead_score || []).map((o) => ({ ts: o.ts, v: typeof o.v === 'number' ? o.v : Number(o.v) }));
    const triggers = tg.triggers || [];
    const nPoints = scoreSeries.length;
    if (!nPoints && !triggers.length) return; // sem histórico ainda
    const spark = nPoints >= 2 ? `<div style="display:flex;align-items:center;gap:10px;margin:2px 0 6px"><span class="muted" style="font-size:12px">Lead score</span>${sparkline(scoreSeries)}<b class="tnum">${scoreSeries[scoreSeries.length - 1].v}</b></div>` : '';

function fmtBytes(n) { if (!n) return '0 B'; const u = ['B', 'KB', 'MB', 'GB', 'TB']; let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return n.toFixed(i ? 1 : 0) + ' ' + u[i]; }

const DC_OF = (host) => /^hel1|^np-(server|db)/.test(host || '') ? 'HEL1' : /^de|np-wk-de/.test(host || '') ? 'DE1' : /laptop/.test(host || '') ? 'Laptop' : /oracle/.test(host || '') ? 'Oracle' : /gcp/.test(host || '') ? 'GCP' : 'Outro';
function groupByHost(ws) {
  const m = {};
  for (const w of ws) { const h = w.host || w.id; (m[h] = m[h] || []).push(w); }
  return Object.entries(m).map(([host, list]) => ({
    host, dc: DC_OF(host), workers: list,
    load: (list.find((w) => w.load != null) || {}).load ?? null,
    cores: (list.find((w) => w.cores) || {}).cores ?? null,
    roles: [...new Set(list.map((w) => w.role))],
    done1h: list.reduce((a, w) => a + (w.done1h || 0), 0),
    done24h: list.reduce((a, w) => a + (w.done24h || 0), 0),
    fail24h: list.reduce((a, w) => a + (w.fail24h || 0), 0),
  }));
}
const loadBar = (load, cores) => {
  if (load == null || !cores) return '<span class="muted" style="font-size:11px">load —</span>';

window.importPreview = async () => {

function importMapping() { const m = {}; document.querySelectorAll('[data-mapf]').forEach((s) => { if (s.value) m[s.dataset.mapf] = s.value; }); return m; }

  let r; try { r = await (await fetch('/api/import', buildApiOpts({ method: 'POST', body: fd }))).json(); } catch (e) { captureFrontendError(e, { action: 'import_submit', route: currentRouteName() }); r = { error: e.message }; }

function REPORT_LABEL(k) { return { lighthouse_seo: 'Performance & SEO (mobile)', lighthouse_mobile: 'Performance & SEO (mobile)', lighthouse_desktop: 'Performance (desktop)', nuclei: 'Segurança', wpscan: 'WordPress', gmb: 'Google Business' }[k] || k; }
async function viewReport() {

  if (!dd.ok) { $('#view').innerHTML = `<div class="np-empty">Report não encontrado.</div>`; return; }
  const r = dd.report; const dom = r.site?.domain || '';
  const head = `<div class="np-head"><div><div class="np-eyebrow">Relatório · ${esc(dom)}</div><h1 class="np-h1">${esc(REPORT_LABEL(r.kind))}</h1></div><button class="np-btn np-btn--sm" onclick="history.back()">← Voltar</button></div>`;
  $('#view').innerHTML = head + reportBody(r);

function reportBody(r) {
  const k = r.kind || '', rep = r.report || {}, sum = r.summary || {};
  if (k.startsWith('lighthouse')) return lhReportBody(rep, sum);
  if (k === 'nuclei') return nucleiReportBody(sum);
  if (k === 'wpscan') return wpscanReportBody(rep, sum);
  if (k === 'gmb') return gmbReportBody(rep);
  return `<div class="np-card"><div class="np-card-b"><pre style="white-space:pre-wrap;font-size:12px">${esc(JSON.stringify(rep, null, 2).slice(0, 4000))}</pre></div></div>`;
}
function lhReportBody(rep, sum) {
  const cats = rep.categories || {};
  const catCard = (key, label) => { const sc = cats[key]?.score != null ? Math.round(cats[key].score * 100) : null; const col = sc == null ? '#9aa0aa' : (sc >= 90 ? '#16a34a' : sc >= 50 ? '#f59e0b' : '#ef4444'); return `<div class="np-kpi"><div class="np-kpi-l">${label}</div><div class="np-kpi-v tnum" style="color:${col}">${sc == null ? '—' : sc}</div></div>`; };
  const audits = rep.audits || {};
  const failing = Object.values(audits).filter((a) => a && a.score != null && a.score < 0.9 && a.title).sort((a, b) => a.score - b.score).slice(0, 15);
  return `<div class="np-kpis">${catCard('performance', 'Performance')}${catCard('seo', 'SEO')}${catCard('accessibility', 'Acessibilidade')}${catCard('best-practices', 'Boas práticas')}</div>
    <section class="np-card" style="margin-top:16px"><div class="np-card-h"><h2>Oportunidades de melhoria</h2><span class="muted" style="font-size:12px">o que a Netmaster pode corrigir</span></div><div class="np-card-b">
    ${failing.length ? failing.map((a) => `<div style="padding:9px 0;border-bottom:1px solid var(--np-border)"><b>${esc(a.title)}</b>${a.displayValue ? ` <span class="muted">— ${esc(a.displayValue)}</span>` : ''}${a.description ? `<div class="muted" style="font-size:12px;margin-top:2px">${esc(String(a.description).replace(/\[([^\]]*)\]\([^)]*\)/g, '$1').slice(0, 220))}</div>` : ''}</div>`).join('') : '<div class="muted">Sem problemas relevantes — o site está bem neste aspeto.</div>'}
    </div></section>${rep.finalUrl ? `<div class="muted" style="font-size:11px;margin-top:8px">Analisado: ${esc(rep.finalUrl)}</div>` : ''}`;

function nucleiReportBody(sum) {
  const bs = sum.bySeverity || {};
  const sevCard = (sv, label, col) => `<div class="np-kpi"><div class="np-kpi-l">${label}</div><div class="np-kpi-v tnum" style="color:${col}">${bs[sv] || 0}</div></div>`;
  return `<div class="np-kpis">
    <div class="np-kpi"><div class="np-kpi-l">Total achados</div><div class="np-kpi-v tnum">${sum.findings || 0}</div></div>
    ${sevCard('critical', 'Críticos', '#ef4444')}${sevCard('high', 'Altos', '#ef4444')}${sevCard('medium', 'Médios', '#f59e0b')}${sevCard('low', 'Baixos', '#22c55e')}</div>
    <section class="np-card" style="margin-top:16px"><div class="np-card-b">${sum.findings ? `<b>${sum.findings} problema(s) de segurança detetado(s)</b> — severidade máxima <b>${esc(sum.severity || '—')}</b>. São vetores que um atacante pode explorar; a Netmaster corrige-os numa revisão de segurança.` : '<div class="muted">Nenhum problema de segurança detetado nas verificações relevantes para a tecnologia deste site.</div>'}</div></section>`;
}
function wpscanReportBody(rep, sum) {
  if (!rep || rep.scan_aborted) return `<div class="np-card"><div class="np-card-b muted">Scan sem dados${rep && rep.scan_aborted ? ` (${esc(String(rep.scan_aborted))})` : ''}.</div></div>`;
  const plugins = rep.plugins || {}, themes = rep.themes || {};
  const row = (name, o) => `<tr><td style="font-weight:600">${esc(name)}</td><td>${esc((o.version && o.version.number) || '—')}</td><td>${(o.vulnerabilities || []).length ? `<span class="np-badge warn" style="height:18px">${o.vulnerabilities.length} vuln</span>` : '<span class="muted">—</span>'}</td></tr>`;
  const list = (obj) => Object.entries(obj).map(([n, o]) => row(n, o)).join('');
  return `<div class="np-kpis">
    <div class="np-kpi"><div class="np-kpi-l">WordPress</div><div class="np-kpi-v" style="font-size:16px">${esc((rep.version && rep.version.number) || '—')}</div></div>
    <div class="np-kpi"><div class="np-kpi-l">Plugins</div><div class="np-kpi-v tnum">${Object.keys(plugins).length}</div></div>
    <div class="np-kpi"><div class="np-kpi-l">Temas</div><div class="np-kpi-v tnum">${Object.keys(themes).length}</div></div>
    <div class="np-kpi"><div class="np-kpi-l">Vulnerabilidades</div><div class="np-kpi-v tnum" style="color:${(sum.vulnCount || 0) ? '#ef4444' : 'inherit'}">${sum.vulnCount || 0}</div></div></div>
    ${Object.keys(plugins).length ? `<section class="np-card" style="margin-top:16px"><div class="np-card-h"><h2>Plugins detetados</h2></div><div class="np-card-b"><div class="np-tablewrap"><table class="np-table"><thead><tr><th>Plugin</th><th>Versão</th><th>Segurança</th></tr></thead><tbody>${list(plugins)}</tbody></table></div></div></section>` : '<div class="muted" style="margin-top:12px">Sem plugins enumerados (scan keyless).</div>'}
    ${Object.keys(themes).length ? `<section class="np-card" style="margin-top:16px"><div class="np-card-h"><h2>Temas</h2></div><div class="np-card-b"><div class="np-tablewrap"><table class="np-table"><thead><tr><th>Tema</th><th>Versão</th><th>Segurança</th></tr></thead><tbody>${list(themes)}</tbody></table></div></div></section>` : ''}`;
}
function gmbReportBody(rep) {
  const f = (l, v) => v ? `<div style="padding:7px 0;border-bottom:1px solid var(--np-border)"><span class="muted" style="display:inline-block;min-width:130px">${l}</span> <b>${esc(String(v))}</b></div>` : '';
  return `<section class="np-card"><div class="np-card-b">
    ${f('Nome', rep.name)}${f('Categoria', rep.category)}${f('Avaliação', rep.rating ? rep.rating + ' ★' : '')}${f('Reviews', rep.reviews)}${f('Telefone', rep.phone)}${f('Morada', rep.address)}${f('Cidade', rep.city)}
    ${rep.url ? `<div style="margin-top:12px"><a class="np-btn np-btn--sm np-btn--primary" href="${esc(rep.url)}" target="_blank" rel="noopener">Ver no Google Maps</a></div>` : ''}
    ${!rep.name ? '<div class="muted">Sem perfil Google Business encontrado.</div>' : ''}</div></section>`;
}

// ========== CONFIGURAÇÃO / SISTEMA (B5) ==========
async function viewConfig() {
  if (!STATS) { try { STATS = await api('/api/stats'); } catch (e) {} }
  renderNav('config');
  if (!REFRESHING) $('#view').innerHTML = `<div class="np-empty">A carregar…</div>`;
  let c; try { c = await api('/api/config'); } catch (e) { $('#view').innerHTML = `<div class="np-head"><div><div class="np-eyebrow">Sistema</div><h1 class="np-h1">Configuração</h1></div></div><div class="np-card"><div class="np-card-b"><b>Erro:</b> ${esc(e.message)}</div></div>`; return; }
  const st = c.status, cfg = c.config;
  let wk = []; try { wk = await api('/api/workers'); } catch (e) {}
  const wkArr = Array.isArray(wk) ? wk : (wk?.workers || []);
  const ROLE_REF = [['base', 'whois · ssl · dns · fingerprint · cms · geoip', 'rede'], ['security', 'nuclei · wpscan', 'rede'], ['browser', 'lighthouse', 'CPU (Chromium)'], ['ai', 'industry (LLM)', 'CPU (Ollama)'], ['residential', 'gmb', 'IP residencial'], ['verify', 'verify (email)', 'APIs externas'], ['writer', 'result_site (write-behind)', 'Postgres']];
  const liveFor = (role) => wkArr.filter((w) => { const r = String(w.role || 'all'); return r === 'all' || r.split(',').map((x) => x.trim()).includes(role); }).length;
  const wkRow = ([role, jobs, prof]) => { const n = liveFor(role); return `<tr><td style="font-weight:600">${role}</td><td style="text-align:right"><span class="np-badge ${n ? 'ok' : 'neutral'}" style="height:18px">${n}</span></td><td class="muted">${jobs}</td><td>${prof}</td></tr>`; };
  const svc = (name, ok, detail) => `<div class="np-kpi"><div class="np-kpi-l"><span class="np-dot" style="background:${ok ? 'var(--np-ok-mark)' : 'var(--np-neutral-mark)'}"></span>${name}</div><div style="font-size:14px;font-weight:800;margin-top:6px;color:${ok ? 'var(--np-ok)' : 'var(--np-text-3)'}">${ok ? 'ligado' : 'desligado'}</div><div class="muted" style="font-size:11px;margin-top:2px;word-break:break-all">${detail || ''}</div></div>`;
  const provRow = (p) => `<tr><td style="font-weight:600">${esc(p.provider)}</td><td class="tnum" style="text-align:right">${p.keys}</td><td class="tnum" style="text-align:right">${p.dailyLimit ? fmt(p.dailyLimit) + '/dia' : '—'}</td></tr>`;
  const sendRow = (s) => `<tr><td style="font-weight:600">${esc(s.label || s.from_email || '—')}</td><td class="muted">${esc(s.from_email || '')}</td><td>${esc(String(s.warmup_stage ?? '—'))}</td><td class="tnum" style="text-align:right">${fmt(s.sent_today || 0)}/${fmt(s.daily_cap || 0)}</td><td>${s.active ? '<span class="np-badge ok" style="height:18px">ativa</span>' : '<span class="np-badge neutral" style="height:18px">inativa</span>'}</td></tr>`;
  $('#view').innerHTML = `<div class="np-head"><div><div class="np-eyebrow">Sistema</div><h1 class="np-h1">Configuração</h1><div class="np-sub">Estado dos serviços + resumo da configuração — os segredos são lidos no servidor mas <b>nunca</b> mostrados.</div></div></div>
    <div class="np-kpis">
      ${svc('Directus', st.directus.up, esc(st.directus.url))}
      ${svc('NATS (fila)', st.nats.up, st.nats.up ? fmt(st.nats.messages) + ' msgs · ' + st.nats.consumers + ' consumers' : esc(st.nats.error || ''))}
      ${svc('Redis (cache)', st.redis.up, esc(st.redis.url))}
      ${svc('ClickHouse', st.clickhouse.up, st.clickhouse.enabled ? 'analytics ligado' : 'perfil analytics desligado')}
      ${svc('Ollama (IA)', st.ollama.enabled, esc(st.ollama.url))}
    </div>
    <div class="np-grid" style="grid-template-columns:repeat(auto-fit,minmax(360px,1fr))">
      <section class="np-card"><div class="np-card-h"><h2>Verificação de email</h2><span class="np-chip">${cfg.mailer === 'smtp' ? 'SMTP' : 'dry-run'}</span></div><div class="np-card-b">
        ${cfg.providers.length ? `<div class="np-tablewrap"><table class="np-table"><thead><tr><th>Provider</th><th style="text-align:right">Chaves</th><th style="text-align:right">Limite</th></tr></thead><tbody>${cfg.providers.map(provRow).join('')}</tbody></table></div>` : `<div class="muted">${cfg.providerFileExists ? 'Sem providers configurados.' : 'config/verify-providers.json ausente (copia o .example).'}</div>`}
        <div class="muted" style="font-size:12px;margin-top:8px">Proxies de verificação: <b>${cfg.proxyCount}</b>${cfg.proxyFileExists ? '' : ' (ficheiro ausente)'}</div></div></section>
      <section class="np-card"><div class="np-card-h"><h2>Contas de envio (outreach)</h2></div><div class="np-card-b">
        ${(cfg.sending || []).length ? `<div class="np-tablewrap"><table class="np-table"><thead><tr><th>Conta</th><th>De</th><th>Warm-up</th><th style="text-align:right">Hoje</th><th></th></tr></thead><tbody>${cfg.sending.map(sendRow).join('')}</tbody></table></div>` : '<div class="muted">Sem contas de envio (outreach pausado — aguarda as VMs de IP limpo).</div>'}</div></section>
    </div>
    <section class="np-card" style="margin-top:16px"><div class="np-card-h"><h2>Workers (frota)</h2><span class="muted" style="font-size:12px">${wkArr.length} a correr</span></div><div class="np-card-b">
      <div class="np-tablewrap"><table class="np-table"><thead><tr><th>Role</th><th style="text-align:right">A correr</th><th>Jobs</th><th>Perfil I/O</th></tr></thead><tbody>${ROLE_REF.map(wkRow).join('')}</tbody></table></div>
      <div class="muted" style="font-size:12px;margin-top:8px">A concorrência por worker define-se por env em cada host (DH_CONC, LIGHTHOUSE_CONC, WPSCAN_CONC, GMB_CONC…). Layout completo em <code>docs/LOAD-DISTRIBUTION.md</code>; detalhe por VM em <a href="#/vms">VMs</a>.</div>
    </div></section>
    <section class="np-card" style="margin-top:16px"><div class="np-card-h"><h2>Ângulos de campanha</h2>${cfg.sender_org ? `<span class="muted" style="font-size:12px">${esc(cfg.sender_org)}</span>` : ''}</div><div class="np-card-b">
      ${cfg.angles.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${cfg.angles.map((a) => `<span class="np-chip">${esc(a)}</span>`).join('')}</div>` : '<div class="muted">config/campaign-angles.json ausente.</div>'}
      <div class="muted" style="font-size:12px;margin-top:10px">Editar chaves/proxies/contas faz-se nos ficheiros gitignored do servidor (nunca pelo browser) — ver <code>docs/</code>. Páginas de <a href="#/outreach">Outreach</a> e relatório público (<code>/r/&lt;token&gt;</code>) já ativos; envio real aguarda contas + VMs de IP limpo.</div>
    </div></section>`;
}

// ---------- router ----------
async function route() {
  closeDrawer();
  try { shellEl.classList.remove('nav-mobile-open'); } catch (e) {}
  const h = (location.hash || '#/overview').slice(2).split('?')[0] || 'overview';
  try {
    if (h === 'directory') await viewDirectory();
    else if (h === 'contacts') await viewContacts();
    else if (h === 'triggers') await viewTriggers();
    else if (h === 'segments') await viewSegments();
    else if (h === 'campaigns') await viewCampaigns();
    else if (h === 'agents') await viewAgents();
    else if (h === 'chat') await viewChat();
    else if (h === 'outreach') await viewOutreach();
    else if (h === 'clients') await viewClients();
    else if (h === 'isps') await viewIsps();
    else if (h === 'import') await viewImport();
    else if (h === 'servers') await viewServers();
    else if (h === 'vms') await viewVms();
    else if (h === 'workers') await viewWorkers();
    else if (h === 'queues') await viewQueues();
    else if (h === 'coverage') await viewCoverage();
    else if (h === 'report') await viewReport();
    else if (h === 'logs') await viewLogs();
    else if (h === 'config') await viewConfig();
    else if (h === 'settings') await viewSettings();
    else await viewOverview();
  } catch (e) { $('#view').innerHTML = `<div class="np-empty">Erro a carregar: ${esc(e.message)}</div>`; }
  if (parseHashQuery().notif) openNotifications(); // deep-link p/ notificações
}
// Auto-refresh global (10s) das páginas de dados. NÃO refresca ferramentas (import/agents/
// settings), nem enquanto se edita um campo, nem com um drawer aberto; preserva o scroll.
let REFRESHING = false;
  const NO_AUTOREFRESH = new Set(['import', 'agents', 'chat', 'settings', 'coverage', 'logs']);
window.addEventListener('hashchange', route);
route();
setInterval(() => {
  const h = (location.hash || '#/overview').slice(2).split('?')[0] || 'overview';
  if (NO_AUTOREFRESH.has(h)) return;
  const ae = document.activeElement;
  if (ae && ['INPUT', 'TEXTAREA', 'SELECT'].includes(ae.tagName)) return;
  if ($('#drawer').classList.contains('open')) return;
  REFRESHING = true; const y = window.scrollY; Promise.resolve(route()).then(() => window.scrollTo(0, y)).finally(() => { REFRESHING = false; });
}, 10000);
</script>
