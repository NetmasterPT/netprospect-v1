# O site é construído com base=/docs/, por isso é servido SOB /docs/ (os assets pedem /docs/assets/*).
# O NPMplus faz proxy SEM strip (`proxy_pass http://<host>:8088;`, sem barra final) → o /docs/ passa intacto.
# Acesso direto na tailnet para testar: http://<host>:8088/docs/  (a raiz redireciona para lá).
server {
  listen 80;
  root /usr/share/nginx/html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location = / { return 302 /docs/; }
  location = /docs { return 302 /docs/; }        # sem barra → com barra (senão 404)

  # API de conhecimento (busca/chat federado) → kb-http na rede npdocs. Barra final = strip do /api/kb/.
  # proxy_buffering off + HTTP/1.1 → o stream SSE do /chat passa em tempo real.
  location /api/kb/ {
    proxy_pass http://kb-http:8099/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location /docs/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /docs/index.html;   # SPA: tudo cai no index (HashRouter trata das rotas)
  }
}
