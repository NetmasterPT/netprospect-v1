# host-exporters.yml — node-exporter (:9100) + cAdvisor (:8080) por host.
# Métricas OS por-guest + por-container, nativas no Prometheus (substituem o coletor /proc custom).
#
# Projeto compose PRÓPRIO `npobs` (não se mistura com a stack do host). Bind na TAILNET_IP → o
# Prometheus CT200 raspa por lá. `restart: unless-stopped`.
#
# GATE por env (flip sem redeploy, ex.: desligar cAdvisor nos Oracles de 950MB):
#   NODE_EXPORTER_REPLICAS=1|0   CADVISOR_REPLICAS=1|0   (default 1)
#   TAILNET_IP=<ip tailscale deste host>   (obrigatório)
#
# Deploy: `docker compose --env-file <host>.env -p npobs -f host-exporters.yml up -d` (via onboard/pull).
# Nós Proxmox (ZFS) usam node-exporter NATIVO (systemd), não este compose — ver deploy/observability/push-configs.sh.

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - '--path.rootfs=/host'
      - '--collector.systemd'
      - '--collector.processes'
      - '--web.listen-address=${TAILNET_IP}:9100'
    volumes:
      - '/:/host:ro,rslave'
    deploy:
      replicas: ${NODE_EXPORTER_REPLICAS:-1}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    network_mode: host
    privileged: true
    command:
      - '--listen_ip=${TAILNET_IP}'
      - '--port=8080'
      - '--docker_only=true'
      - '--housekeeping_interval=30s'
      - '--store_container_labels=false'
    volumes:
      - '/:/rootfs:ro'
      - '/var/run:/var/run:ro'
      - '/sys:/sys:ro'
      - '/var/lib/docker/:/var/lib/docker:ro'
      - '/dev/disk/:/dev/disk:ro'
    devices:
      - '/dev/kmsg:/dev/kmsg'
    deploy:
      replicas: ${CADVISOR_REPLICAS:-1}
