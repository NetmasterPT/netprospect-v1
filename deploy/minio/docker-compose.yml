# de-minio — object storage no HDD barato do DE1. Só na tailnet (NUNCA público: tem creds).
# Deploy: preencher .env (creds + TAILNET_IP), montar o HDD em /srv/minio, `docker compose up -d`.
services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /srv/minio:/data            # o HDD
    ports:
      - "${TAILNET_IP}:9000:9000"    # API — só tailnet
      - "127.0.0.1:9001:9001"        # consola — só por túnel SSH
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
